    .chapter-content h3 { font-size: 1rem; font-weight: 600; color: #374151; margin-top: 1.25rem; margin-bottom: 0.5rem; }
    .chapter-content h4 { font-size: 0.875rem; font-weight: 600; color: #4b5563; margin-top: 1rem; margin-bottom: 0.375rem; }
    .chapter-content p { margin-bottom: 0.75rem; line-height: 1.75; color: #4b5563; }
    .chapter-content ul, .chapter-content ol { margin-bottom: 0.75rem; padding-left: 1.5rem; color: #4b5563; }
    .chapter-content li { margin-bottom: 0.25rem; line-height: 1.75; }
    .chapter-content blockquote { border-left: 3px solid #93c5fd; background: #eff6ff; padding: 0.75rem 1rem; margin: 0.75rem 0; border-radius: 0.375rem; font-size: 0.875rem; color: #4b5563; }
    .chapter-content code { background: #f3f4f6; padding: 0.125rem 0.375rem; border-radius: 0.25rem; font-size: 0.8125rem; color: #dc2626; }
    .chapter-content pre { background: #1f2937; color: #e5e7eb; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 1rem; font-size: 0.8125rem; }
    .chapter-content pre code { background: none; color: inherit; padding: 0; }
    .chapter-content table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; font-size: 0.875rem; }
    .chapter-content th { background: #f9fafb; padding: 0.5rem 0.75rem; border: 1px solid #e5e7eb; text-align: left; font-weight: 600; }
    .chapter-content td { padding: 0.5rem 0.75rem; border: 1px solid #e5e7eb; }
    .chapter-content hr { margin: 1.5rem 0; border-color: #e5e7eb; }
    .chapter-content strong { color: #1f2937; }
    .chapter-content a { color: #2563eb; text-decoration: underline; }
    .chapter-content a:hover { color: #1d4ed8; }
  </style>
</head>

      <div class="flex items-center gap-3"><div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 font-bold text-sm">张</div><div class="flex-1 min-w-0"><p class="text-sm font-medium text-gray-800 truncate">张三（学生）</p><p class="text-xs text-gray-400 truncate">2024001</p></div></div>
      <a href="login.html" class="mt-3 block text-center text-xs text-gray-400 hover:text-red-500 transition">退出登录</a>

  <main class="ml-56 flex-1 p-8 min-h-screen">
    <!-- 面包屑导航 -->
    <div class="mb-6">
      <div class="flex items-center gap-2 text-xs text-gray-400 mb-2">
        <a href="courses.html" class="hover:text-blue-600">课程学习</a>
        <span>/</span>
        <a href="javascript:history.back()" class="hover:text-blue-600" id="breadcrumb-course">课程详情</a>
        <span>/</span>
        <span class="text-gray-600" id="breadcrumb-chapter">章节详情</span>
      </div>
      <h1 class="text-xl font-bold text-gray-800" id="chapter-title">章节详情</h1>
      <div class="flex items-center gap-3 mt-1.5" id="chapter-meta">
        <span class="text-xs text-gray-400" id="chapter-course-name"></span>
        <span class="text-xs px-2 py-0.5 rounded-full font-medium" id="chapter-type-badge"></span>
        <span class="text-xs px-2 py-0.5 rounded-full font-medium" id="chapter-status-badge"></span>
        <span class="text-xs" id="chapter-deadline"></span>
      </div>
    </div>

    <!-- 内容区：两列布局 -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

      <!-- 左: 主内容 -->
      <div class="lg:col-span-2 space-y-5">

        <!-- 章节内容（Markdown 渲染） -->
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
          <h2 class="text-base font-bold text-gray-800 mb-3 flex items-center gap-2">
            <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
            学习资料
          </h2>
          <div id="chapter-content" class="chapter-content text-sm">
            <p class="text-gray-400">加载中…</p>
          </div>
        </div>

      </div>

      <!-- 右: 侧边信息 -->
      <div class="space-y-5">

        <!-- 评分标准 -->
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5">
          <h3 class="text-sm font-bold text-gray-800 mb-3 flex items-center gap-2">
            <svg class="w-4 h-4 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>
            评分标准
          </h3>
          <p id="chapter-grading" class="text-sm text-gray-600">加载中…</p>
        </div>

        <!-- 任务说明 -->
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5">
          <h3 class="text-sm font-bold text-gray-800 mb-3 flex items-center gap-2">
            <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            任务说明
          </h3>
          <p class="text-sm text-gray-600 mb-3">完成本章学习后，请按任务要求提交对应作业。</p>
          <a href="assignments.html" class="block w-full text-center bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2 px-4 rounded-lg transition">
            前往作业提交 →
          </a>
        </div>

        <!-- 附件资源 -->
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5">
          <h3 class="text-sm font-bold text-gray-800 mb-3 flex items-center gap-2">
            <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            附件资源
          </h3>
          <div id="chapter-resources">
            <p class="text-sm text-gray-400">加载中…</p>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script>
  var API = '';
  var params = new URLSearchParams(window.location.search);
  var chapterId = params.get('id');

  if (!chapterId) {
    document.getElementById('chapter-title').textContent = '未指定章节';
    document.getElementById('chapter-content').innerHTML = '<p class="text-red-500">请从课程页面选择章节查看</p>';
  }

  function formatSize(bytes) {
    if (!bytes || bytes === 0) return '未知大小';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
  }

  function getFileIcon(suffix) {
    var map = {'.pdf': 'text-red-500', '.doc': 'text-blue-500', '.docx': 'text-blue-500', '.zip': 'text-yellow-500', '.rar': 'text-yellow-500', '.py': 'text-green-600', '.c': 'text-blue-600', '.cpp': 'text-purple-600', '.xlsx': 'text-green-500', '.xls': 'text-green-500'};
    return map[suffix] || 'text-gray-500';
  }

  async function loadChapter() {
    if (!chapterId) return;
    try {
      var r = await fetch(API + '/api/chapters/' + chapterId);
      var ch = await r.json();

      document.getElementById('chapter-title').textContent = '第' + ch.chapter_no + '章 ' + ch.title;

      var typeColors = {'考试':'bg-red-100 text-red-600','作业':'bg-blue-100 text-blue-600','签到':'bg-green-100 text-green-600'};
      var statusColors = {'已完成':'bg-green-100 text-green-600','进行中':'bg-blue-100 text-blue-600','待开始':'bg-gray-100 text-gray-500','未通过':'bg-red-100 text-red-600'};

      document.getElementById('chapter-course-name').textContent = ch.course_id;
      var tb = document.getElementById('chapter-type-badge');
      tb.textContent = ch.chapter_type;
      tb.className = 'text-xs px-2 py-0.5 rounded-full font-medium ' + (typeColors[ch.chapter_type] || 'bg-gray-100 text-gray-500');

      var sb = document.getElementById('chapter-status-badge');
      sb.textContent = ch.status;
      sb.className = 'text-xs px-2 py-0.5 rounded-full font-medium ' + (statusColors[ch.status] || 'bg-gray-100 text-gray-500');

      var dl = document.getElementById('chapter-deadline');
      if (ch.deadline) {
        var d = new Date(ch.deadline.replace(' ', 'T'));
        dl.textContent = '截止：' + ch.deadline;
        dl.className = 'text-xs ' + (d < new Date() ? 'text-red-500 font-medium' : 'text-gray-500');
      } else {
        dl.textContent = '截止时间待定';
        dl.className = 'text-xs text-gray-400';
      }

      document.getElementById('chapter-grading').textContent = ch.grading_criteria || '见评分标准文档';

      // 同步加载课程名称
      try {
        var cr = await fetch(API + '/api/courses/' + ch.course_id + '/chapters');
        var cd = await cr.json();
        document.getElementById('breadcrumb-course').textContent = cd.course.title;
        document.getElementById('breadcrumb-course').href = '/course?id=' + ch.course_id;
      } catch(e) {}

      // 加载内容
      loadContent(chapterId);
      // 加载资源
      loadResources(chapterId);
    } catch(e) {
      document.getElementById('chapter-title').textContent = '章节加载失败';
      document.getElementById('chapter-content').innerHTML = '<p class="text-red-500">无法加载章节信息</p>';
    }
  }

  async function loadContent(id) {
    try {
      var r = await fetch(API + '/api/chapters/' + id + '/content');
      var d = await r.json();
      document.getElementById('chapter-content').innerHTML = d.content_html || '<p class="text-gray-400">暂无内容</p>';
    } catch(e) {
      document.getElementById('chapter-content').innerHTML = '<p class="text-gray-400">暂无学习资料内容</p>';
    }
  }

  async function loadResources(id) {
    try {
      var r = await fetch(API + '/api/chapters/' + id + '/resources');
      var list = await r.json();
      var container = document.getElementById('chapter-resources');
      if (!list || !list.length) {
        container.innerHTML = '<p class="text-sm text-gray-400">暂无附件资源</p>';
        return;
      }
      var html = '<ul class="space-y-2">';
      for (var i = 0; i < list.length; i++) {
        var res = list[i];
        var iconColor = getFileIcon(res.suffix);
        html += '<li><a href="' + res.url + '" download class="flex items-center gap-2 p-2 rounded-lg hover:bg-gray-50 transition border border-gray-100">'
          + '<svg class="w-4 h-4 ' + iconColor + '" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>'
          + '<div class="flex-1 min-w-0"><p class="text-sm text-gray-700 truncate">' + res.name + '</p><p class="text-xs text-gray-400">' + formatSize(res.size) + '</p></div>'
          + '<span class="text-xs text-blue-600 flex-shrink-0">下载</span>'
          + '</a></li>';
      }
      html += '</ul>';
      container.innerHTML = html;
    } catch(e) {
      document.getElementById('chapter-resources').innerHTML = '<p class="text-sm text-gray-400">暂无附件资源</p>';
    }
  }

  loadChapter();
  </script>
</body>
