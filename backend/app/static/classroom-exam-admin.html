<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>课堂考试管理 - 教师</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Microsoft YaHei",sans-serif;background:#f5f5f5;color:#333}
  .header{background:#1565c0;color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center}
  .container{max-width:960px;margin:20px auto;padding:0 16px}
  .card{background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.1);margin-bottom:16px;padding:20px}
  input,select,textarea{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;margin-bottom:8px;font-size:.9rem}
  .btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-weight:600}
  .btn-p{background:#1565c0;color:#fff}.btn-d{background:#c62828;color:#fff}
  .btn-o{background:#fff;border:1px solid #1565c0;color:#1565c0}
  table{width:100%;border-collapse:collapse;font-size:.85rem}
  th,td{padding:8px;border-bottom:1px solid #eee;text-align:left}
  .q-block{border:1px dashed #bbdefb;padding:12px;margin:8px 0;border-radius:8px}
  .hidden{display:none !important}
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
  .login-box{background:#fff;padding:32px;border-radius:12px;width:320px;box-shadow:0 4px 20px rgba(0,0,0,.12)}
  #app{display:none}
  .login-alert{background:#ffebee;color:#c62828;border:1px solid #ef9a9a;padding:10px 12px;border-radius:6px;font-size:.85rem;margin-top:10px}
  .lbl{font-size:.8rem;color:#666;margin:8px 0 4px;display:block}
  .hint{font-size:.75rem;color:#888;margin:6px 0}
  .btn-sm{padding:4px 10px;font-size:.8rem}
  .time-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .duration-btns{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 12px}
  .duration-btns .btn-sm{background:#e3f2fd;border:1px solid #90caf9;color:#1565c0}
  .q-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
  .q-head .q-type{width:auto;flex:1;min-width:100px;margin:0}
  .q-head .btn-del-q{margin-left:auto}
  .opt-row,.blank-row{display:flex;align-items:center;gap:8px;margin:6px 0;flex-wrap:wrap}
  .opt-row .opt-text,.blank-row .blank-ans{flex:1;min-width:120px;margin:0;width:auto}
  /* 固定选项字母列宽，避免字母与输入框重叠 */
  .opt-row .opt-ans{flex:0 0 56px;min-width:56px;text-align:left}
  .opt-row .opt-ans input{margin-right:6px}
  .opt-row .opt-text{flex:1;min-width:120px}
  .opt-ans{white-space:nowrap;font-weight:600;min-width:36px}
  .blank-row .blank-score{width:72px;margin:0}
  .btn-del-opt,.btn-del-blank{background:#ffebee;color:#c62828;border:none;width:28px;height:28px;border-radius:4px;cursor:pointer;font-size:1.1rem}
  .blank-total{margin-top:8px;font-size:.9rem}
</style>
<!-- Inline classroom-exam-admin-questions.js to avoid static file 404 issues -->
<script>
/* inlined from classroom-exam-admin-questions.js */
try {
  console.log("classroom-exam-admin-questions.js: init");
  window.ClassroomQuestionEditor = (function () {
    "use strict";

  const LETTERS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

  function esc(s) {
    return String(s || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/\"/g, "&quot;");
  }

  function nextLetter(n) {
    return LETTERS[n] || "?";
  }

  function renumberBlocks(container) {
    container.querySelectorAll(".q-block").forEach(function (block, idx) {
      block.querySelector(".q-num").textContent = "题目 " + (idx + 1);
    });
  }

  function bindTypeSwitch(block) {
    var sel = block.querySelector(".q-type");
    sel.addEventListener("change", function () {
      renderBody(block);
    });
  }

  function renderBody(block) {
    var body = block.querySelector(".q-body");
    var t = block.querySelector(".q-type").value;
    if (t === "single" || t === "multi") {
      body.innerHTML =
        '<div class="opt-list"></div>' +
        '<button type="button" class="btn btn-o btn-sm btn-add-opt">+ 新建选项</button>' +
        '<p class="hint">' +
        (t === "single" ? "点击选项左侧按钮标记唯一正确答案" : "勾选多个正确答案") +
        "</p>" +
        '<label class="lbl">本题分值</label><input type="number" class="q-score" value="2" min="0.5" step="0.5">';
      bindOptionList(block, t);
    } else if (t === "blank") {
      body.innerHTML =
        '<div class="blank-list"></div>' +
        '<button type="button" class="btn btn-o btn-sm btn-add-blank">+ 新建填空</button>' +
        '<p class="hint">每空单独设置参考答案与分值，本题总分为各空之和</p>' +
        '<div class="blank-total">本题总分：<strong class="blank-sum">0</strong> 分</div>';
      addBlankRow(block);
      block.querySelector(".btn-add-blank").addEventListener("click", function () {
        addBlankRow(block);
      });
    } else {
      body.innerHTML =
        '<label class="lbl">本题分值</label><input type="number" class="q-score" value="5" min="0.5" step="0.5">' +
        '<p class="hint">简答题需教师人工批改，学生提交后不会即时显示该题分数</p>';
    }
  }

  function bindOptionList(block, qtype) {
    var list = block.querySelector(".opt-list");
    var btn = block.querySelector(".btn-add-opt");
    btn.addEventListener("click", function () {
      var rows = list.querySelectorAll(".opt-row");
      if (rows.length >= 26) {
        alert("最多 26 个选项");
        return;
      }
      addOptionRow(block, qtype, "", false);
    });
    if (!list.children.length) {
      addOptionRow(block, qtype, "", false);
      addOptionRow(block, qtype, "", false);
    }
  }

  function addOptionRow(block, qtype, text, isAnswer) {
    var list = block.querySelector(".opt-list");
    var idx = list.querySelectorAll(".opt-row").length;
    if (idx >= 26) return;
    var letter = nextLetter(idx);
    var row = document.createElement("div");
    row.className = "opt-row";
    var inputType = qtype === "single" ? "radio" : "checkbox";
    var name = "correct-" + block.dataset.qid;
    row.innerHTML =
      '<label class="opt-ans">' +
      '<input type="' + inputType + '" name="' + name + '" value="' + letter + '"' +
      (isAnswer ? " checked" : "") + "> " + letter +
      "</label>" +
      '<input type="text" class="opt-text" placeholder="选项 ' + letter + ' 内容" value="' + esc(text) + '">' +
      '<button type="button" class="btn-del-opt" title="删除选项">×</button>';
    list.appendChild(row);
    row.querySelector(".btn-del-opt").addEventListener("click", function () {
      if (list.querySelectorAll(".opt-row").length <= 1) {
        alert("至少保留一个选项");
        return;
      }
      row.remove();
      relabelOptions(list);
    });
  }

  function relabelOptions(list) {
    list.querySelectorAll(".opt-row").forEach(function (row, i) {
      var letter = nextLetter(i);
      row.querySelector(".opt-ans").childNodes[1].textContent = " " + letter;
      row.querySelector(".opt-ans input").value = letter;
      row.querySelector(".opt-text").placeholder = "选项 " + letter + " 内容";
    });
  }

  function addBlankRow(block) {
    var list = block.querySelector(".blank-list");
    var n = list.querySelectorAll(".blank-row").length + 1;
    var row = document.createElement("div");
    row.className = "blank-row";
    row.innerHTML =
      '<span class="blank-label">空 ' + n + '</span>' +
      '<input type="text" class="blank-ans" placeholder="参考答案（多个用 | 分隔）">' +
      '<input type="number" class="blank-score" value="1" min="0.5" step="0.5" title="分值">' +
      '<span class="unit">分</span>' +
      '<button type="button" class="btn-del-blank">×</button>';
    list.appendChild(row);
    row.querySelector(".btn-del-blank").addEventListener("click", function () {
      if (list.querySelectorAll(".blank-row").length <= 1) {
        alert("至少保留一个填空");
        return;
      }
      row.remove();
      relabelBlanks(list);
      updateBlankSum(block);
    });
    row.querySelector(".blank-score").addEventListener("input", function () {
      updateBlankSum(block);
    });
    updateBlankSum(block);
  }

  function relabelBlanks(list) {
    list.querySelectorAll(".blank-row").forEach(function (row, i) {
      row.querySelector(".blank-label").textContent = "空 " + (i + 1);
    });
  }

  function updateBlankSum(block) {
    var sum = 0;
    block.querySelectorAll(".blank-score").forEach(function (inp) {
      sum += parseFloat(inp.value) || 0;
    });
    var el = block.querySelector(".blank-sum");
    if (el) el.textContent = sum.toFixed(1).replace(/\.0$/, "");
  }

  function createBlock(container) {
    var qid = "q" + Date.now() + Math.random().toString(36).slice(2, 6);
    var div = document.createElement("div");
    div.className = "q-block";
    div.dataset.qid = qid;
    div.innerHTML =
      '<div class="q-head">' +
      '<strong class="q-num">题目</strong>' +
      '<select class="q-type">' +
      '<option value="single">单选题</option>' +
      '<option value="multi">多选题</option>' +
      '<option value="blank">填空题</option>' +
      '<option value="short">简答题</option>' +
      "</select>" +
      '<button type="button" class="btn btn-d btn-sm btn-del-q">删除题目</button>' +
      "</div>" +
      '<textarea class="q-content" rows="2" placeholder="题干"></textarea>' +
      '<div class="q-body"></div>';
    container.appendChild(div);
    div.querySelector(".btn-del-q").addEventListener("click", function () {
      if (!confirm("确定删除本题？")) return;
      div.remove();
      renumberBlocks(container);
    });
    bindTypeSwitch(div);
    renderBody(div);
    renumberBlocks(container);
    return div;
  }

  function collectFromBlock(block) {
    var qtype = block.querySelector(".q-type").value;
    var content = block.querySelector(".q-content").value.trim();
    if (!content) throw new Error("请填写题干");

    if (qtype === "single" || qtype === "multi") {
      var rows = block.querySelectorAll(".opt-row");
      var options = [];
      var correct = [];
      rows.forEach(function (row, i) {
        var letter = nextLetter(i);
        var text = row.querySelector(".opt-text").value.trim();
        if (!text) throw new Error("请填写选项 " + letter + " 的内容");
        options.push(text);
        if (row.querySelector(".opt-ans input").checked) correct.push(letter);
      });
      if (!correct.length) throw new Error("请设置正确答案");
      if (qtype === "single" && correct.length > 1) throw new Error("单选题只能有一个正确答案");
      var score = parseFloat(block.querySelector(".q-score").value) || 0;
      if (score <= 0) throw new Error("请设置本题分值");
      return {
        qtype: qtype,
        content: content,
        options: options,
        answer_key: { correct: qtype === "single" ? correct[0] : correct },
        score: score,
      };
    }

    if (qtype === "blank") {
      var blanks = [];
      block.querySelectorAll(".blank-row").forEach(function (row, i) {
        var raw = row.querySelector(".blank-ans").value.trim();
        if (!raw) throw new Error("请填写第 " + (i + 1) + " 空的参考答案");
        var acceptable = raw.split("|").map(function (s) { return s.trim(); }).filter(Boolean);
        var bscore = parseFloat(row.querySelector(".blank-score").value) || 0;
        if (bscore <= 0) throw new Error("请设置第 " + (i + 1) + " 空的分值");
        blanks.push({ acceptable: acceptable, score: bscore });
      });
      var total = blanks.reduce(function (s, b) { return s + b.score; }, 0);
      return {
        qtype: "blank",
        content: content,
        options: null,
        answer_key: { blanks: blanks },
        score: total,
      };
    }

    var shortScore = parseFloat(block.querySelector(".q-score").value) || 0;
    if (shortScore <= 0) throw new Error("请设置简答题分值");
    return {
      qtype: "short",
      content: content,
      options: null,
      answer_key: {},
      score: shortScore,
    };
  }

  function collectAll(container) {
    var blocks = container.querySelectorAll(".q-block");
    if (!blocks.length) throw new Error("请至少添加一道题目");
    var out = [];
    blocks.forEach(function (b) {
      out.push(collectFromBlock(b));
    });
    return out;
  }

  function initDatetimeDefaults() {
    var start = document.getElementById("exam-start");
    var end = document.getElementById("exam-end");
    if (!start || !end) return;
    var now = new Date();
    now.setMinutes(now.getMinutes() - now.getMinutes() % 5);
    var pad = function (n) { return String(n).padStart(2, "0"); };
    var toLocal = function (d) {
      return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()) +
        "T" + pad(d.getHours()) + ":" + pad(d.getMinutes());
    };
    if (!start.value) start.value = toLocal(now);
    if (!end.value) {
      var later = new Date(now.getTime() + 30 * 60000);
      end.value = toLocal(later);
    }
  }

  function bindDurationShortcuts() {
    document.querySelectorAll("[data-duration]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var start = document.getElementById("exam-start");
        var end = document.getElementById("exam-end");
        if (!start.value) initDatetimeDefaults();
        var base = new Date(start.value);
        if (isNaN(base)) base = new Date();
        var mins = parseInt(btn.dataset.duration, 10);
        var later = new Date(base.getTime() + mins * 60000);
        var pad = function (n) { return String(n).padStart(2, "0"); };
        end.value = later.getFullYear() + "-" + pad(later.getMonth() + 1) + "-" + pad(later.getDate()) +
          "T" + pad(later.getHours()) + ":" + pad(later.getMinutes());
      });
    });
  }

  function formatDatetimeForApi(localVal) {
    if (!localVal) return "";
    return localVal.replace("T", " ") + ":00";
  }

  return {
    createBlock: createBlock,
    collectAll: collectAll,
    initDatetimeDefaults: initDatetimeDefaults,
    bindDurationShortcuts: bindDurationShortcuts,
    formatDatetimeForApi: formatDatetimeForApi,
  };
  })();
} catch (err) {
  console.error("classroom-exam-admin-questions.js: load failed", err);
  window.ClassroomQuestionEditor = null;
}

</script>
</head>
<body>
<div id="login-view" class="login-wrap">
  <div class="login-box">
    <h2 style="color:#1565c0;margin-bottom:16px">教师登录</h2>
    <form id="login-form">
      <input type="password" id="pwd" placeholder="管理密码" autocomplete="current-password" required>
      <button type="submit" class="btn btn-p" style="width:100%;margin-top:8px" id="btn-login">登录</button>
    </form>
    <div id="login-err"></div>
  </div>
</div>
<div id="app">
  <div class="header">
    <span>课堂在线考试管理 (F-S-053)</span>
    <div style="display:flex;gap:12px;align-items:center">
      <a href="/teacher" style="color:#fff;font-size:.85rem">返回主后台</a>
      <button type="button" id="btn-logout" style="background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);padding:4px 12px;border-radius:4px;cursor:pointer;font-size:.85rem">退出</button>
    </div>
  </div>
  <div class="container">
    <div id="app-err" class="hidden" style="background:#ffebee;color:#c62828;padding:12px;border-radius:8px;margin-bottom:12px;font-size:.9rem"></div>
    <div class="card">
      <h3 style="margin-bottom:12px">发布新考试</h3>
      <label>考试 ID（留空自动生成）</label>
      <input id="exam-id" placeholder="exam-week11">
      <label>标题</label>
      <input id="exam-title" placeholder="第11周随堂测验">
      <div class="time-row">
        <div><label class="lbl">开始时间</label><input type="datetime-local" id="exam-start"></div>
        <div><label class="lbl">结束时间</label><input type="datetime-local" id="exam-end"></div>
      </div>
      <div class="duration-btns">
        <span style="font-size:.8rem;color:#666;align-self:center">快捷时长：</span>
        <button type="button" class="btn btn-sm" data-duration="15">15 分钟</button>
        <button type="button" class="btn btn-sm" data-duration="30">30 分钟</button>
        <button type="button" class="btn btn-sm" data-duration="45">45 分钟</button>
        <button type="button" class="btn btn-sm" data-duration="60">60 分钟</button>
        <button type="button" class="btn btn-sm" data-duration="90">90 分钟</button>
      </div>
      <div id="questions"></div>
      <button type="button" class="btn btn-o" id="btn-add-q">+ 添加题目</button>
      <button type="button" class="btn btn-p" id="btn-create" style="margin-top:12px">发布考试</button>
      <p id="create-msg" style="margin-top:8px;font-size:.85rem"></p>
    </div>
    <div class="card">
      <h3 style="margin-bottom:12px">考试列表</h3>
      <div id="exam-list"></div>
    </div>
    <div class="card hidden" id="grade-panel">
      <h3 id="grade-title">批改答卷</h3>
      <div id="grade-body"></div>
      <button type="button" class="btn btn-p" id="btn-save-grade">保存批改</button>
    </div>
  </div>
</div>
<script>
(function () {
  "use strict";

  /* 与 /teacher 相同：相对路径，避免 localhost 与 127.0.0.1 跨域导致登录静默失败 */
  const API = "";
  let token = sessionStorage.getItem("teacher_token") || "";
  let gradeCtx = null;

  function formatDetail(detail) {
    if (!detail) return "";
    if (typeof detail === "string") return detail;
    if (Array.isArray(detail)) {
      return detail.map(function (x) { return x.msg || String(x); }).join("；");
    }
    return String(detail);
  }

  function hdr() {
    return { "Content-Type": "application/json", "Authorization": "Bearer " + token };
  }

  async function api(path, opts) {
    opts = opts || {};
    var r = await fetch(API + path, opts);
    var d = {};
    try { d = await r.json(); } catch (e) { /* ignore */ }
    if (!r.ok) {
      throw new Error(formatDetail(d.detail) || r.statusText || "请求失败");
    }
    return d;
  }

  function showLoginErr(msg) {
    var el = document.getElementById("login-err");
    if (!msg) { el.innerHTML = ""; return; }
    el.innerHTML = '<div class="login-alert">' + msg + "</div>";
  }

  function showAppErr(msg) {
    var el = document.getElementById("app-err");
    if (!msg) {
      el.classList.add("hidden");
      el.textContent = "";
      return;
    }
    el.textContent = msg;
    el.classList.remove("hidden");
  }

  function showMain() {
    document.getElementById("login-view").style.display = "none";
    document.getElementById("app").style.display = "block";
    showAppErr("");
    if (!document.getElementById("questions").children.length) {
      ClassroomQuestionEditor.createBlock(document.getElementById("questions"));
    }
    ClassroomQuestionEditor.initDatetimeDefaults();
    ClassroomQuestionEditor.bindDurationShortcuts();
  }

  function showLogin() {
    document.getElementById("login-view").style.display = "flex";
    document.getElementById("app").style.display = "none";
  }

  async function doLogin() {
    var pwd = document.getElementById("pwd").value.trim();
    var btn = document.getElementById("btn-login");
    showLoginErr("");
    btn.disabled = true;
    var btnLabel = btn.textContent;
    btn.textContent = "登录中…";
    try {
      var r = await fetch(API + "/api/teacher/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: pwd }),
      });
      var data = {};
      try { data = await r.json(); } catch (e) { /* ignore */ }
      if (!r.ok) {
        showLoginErr(formatDetail(data.detail) || "密码错误");
        return;
      }
      if (!data.token) {
        showLoginErr("登录失败：服务器未返回有效令牌");
        return;
      }
      token = data.token;
      sessionStorage.setItem("teacher_token", token);
      showMain();
      try {
        await loadExams();
      } catch (e) {
        showAppErr("加载考试列表失败：" + (e.message || e));
      }
    } catch (e) {
      showLoginErr("网络错误：" + (e.message || e) + "（请确认已启动考试 API，本地为 8009 端口）");
    } finally {
      btn.disabled = false;
      btn.textContent = btnLabel;
    }
  }

  function logout() {
    token = "";
    sessionStorage.removeItem("teacher_token");
    document.getElementById("pwd").value = "";
    showLoginErr("");
    showLogin();
  }

  document.getElementById("login-form").addEventListener("submit", function (e) {
    e.preventDefault();
    doLogin();
  });

  document.getElementById("btn-logout").addEventListener("click", logout);

  async function tryRestoreSession() {
    if (!token) return;
    try {
      var r = await fetch(API + "/api/teacher/classroom-exams", { headers: hdr() });
      if (!r.ok) throw new Error("invalid");
      showMain();
      await loadExams();
    } catch (e) {
      token = "";
      sessionStorage.removeItem("teacher_token");
    }
  }
  tryRestoreSession();

var __btnAddQ = document.getElementById("btn-add-q");
if (__btnAddQ) {
  __btnAddQ.addEventListener("click", function () {
    try {
      if (!window.ClassroomQuestionEditor) throw new Error("ClassroomQuestionEditor 未加载");
      ClassroomQuestionEditor.createBlock(document.getElementById("questions"));
    } catch (err) {
      console.error(err);
      try { alert("添加题目失败: " + (err && err.message)); } catch (e) { /* ignore */ }
    }
  });
} else {
  console.warn('btn-add-q 元素不存在');
}

document.getElementById("btn-create").addEventListener("click", async function () {
  var msgEl = document.getElementById("create-msg");
  try {
    var questions = ClassroomQuestionEditor.collectAll(document.getElementById("questions"));
    var title = document.getElementById("exam-title").value.trim();
    if (!title) throw new Error("请填写考试标题");
    var startAt = ClassroomQuestionEditor.formatDatetimeForApi(
      document.getElementById("exam-start").value
    );
    var endAt = ClassroomQuestionEditor.formatDatetimeForApi(
      document.getElementById("exam-end").value
    );
    if (!startAt || !endAt) throw new Error("请设置开始与结束时间");
    var body = {
      id: document.getElementById("exam-id").value.trim() || undefined,
      title: title,
      start_at: startAt,
      end_at: endAt,
      questions: questions,
    };
    var d = await api("/api/teacher/classroom-exams", {
      method: "POST", headers: hdr(), body: JSON.stringify(body),
    });
    msgEl.textContent = "发布成功：" + d.id;
    msgEl.style.color = "#2e7d32";
    loadExams();
  } catch (e) {
    msgEl.textContent = e.message || String(e);
    msgEl.style.color = "#c62828";
  }
});

async function loadExams(){
  const exams = await api("/api/teacher/classroom-exams", { headers:hdr() });
  document.getElementById("exam-list").innerHTML = exams.length ? `<table>
    <tr><th>标题</th><th>时间</th><th>状态</th><th>题数</th><th>已交</th><th>操作</th></tr>
    ${exams.map(e=>`<tr>
      <td>${e.title}</td><td style="font-size:.75rem">${e.start_at}<br>${e.end_at}</td>
      <td>${e.status}</td><td>${e.question_count}</td><td>${e.submitted_count}</td>
      <td><button class="btn btn-o btn-sm" data-id="${e.id}">提交列表</button>
      <button class="btn btn-d btn-sm" data-del="${e.id}">删除</button></td>
    </tr>`).join("")}</table>
    <p style="margin-top:8px;font-size:.8rem;color:#888">学生入口：<a href="/classroom-exam">/classroom-exam</a></p>` : "<p>暂无考试</p>";

  document.querySelectorAll("[data-id]").forEach(b => b.onclick = () => loadAttempts(b.dataset.id));
  document.querySelectorAll("[data-del]").forEach(b => b.onclick = async () => {
    if(!confirm("确定删除？")) return;
    await api("/api/teacher/classroom-exams/"+b.dataset.del, { method:"DELETE", headers:hdr() });
    loadExams();
  });
}

async function loadAttempts(examId){
  const d = await api("/api/teacher/classroom-exams/"+examId+"/attempts", { headers:hdr() });
  const box = document.createElement("div");
  box.innerHTML = `<h4 style="margin:12px 0">${d.exam_title} — 提交列表</h4><table>
    <tr><th>姓名</th><th>学号</th><th>状态</th><th>客观分</th><th>总分</th><th>操作</th></tr>
    ${d.attempts.filter(a=>a.status!=="draft").map(a=>`<tr>
      <td>${a.name}</td><td>${a.student_id}</td><td>${a.status}</td>
      <td>${a.objective_score??"—"}</td><td>${a.total_score??"—"}</td>
      <td>${a.subjective_pending?`<button data-grade="${a.id}" data-exam="${examId}">批改</button>`:"—"}</td>
    </tr>`).join("") || "<tr><td colspan=6>暂无提交</td></tr>"}
  </table>`;
  document.getElementById("exam-list").appendChild(box);
  box.querySelectorAll("[data-grade]").forEach(b => b.onclick = () => openGrade(b.dataset.exam, b.dataset.grade));
}

function formatAnswer(q) {
  var a = q.student_answer;
  if (a == null || a === "") return "（未作答）";
  if (q.qtype === "multi" && Array.isArray(a)) return a.join("、");
  if (q.qtype === "blank" && Array.isArray(a)) return a.map(function (v, i) { return "空" + (i + 1) + "：" + (v || "—"); }).join("； ");
  if (q.qtype === "blank" && typeof a === "object") {
    return Object.keys(a).sort().map(function (k) { return "空" + (parseInt(k, 10) + 1) + "：" + a[k]; }).join("； ");
  }
  return String(a);
}

async function openGrade(examId, attemptId){
  const d = await api("/api/teacher/classroom-exams/" + examId + "/attempts/" + attemptId, { headers:hdr() });
  gradeCtx = { examId, attemptId };
  document.getElementById("grade-panel").classList.remove("hidden");
  document.getElementById("grade-title").textContent = "批改答卷 — " + d.attempt.student_id;
  var html = d.questions.map(function (q, i) {
    var head = "<div class='q-block'><p><strong>" + (i + 1) + ". [" + q.qtype + "]</strong> " + q.content + "（满分 " + q.max_score + "）</p>";
    head += "<p style='background:#f5f5f5;padding:8px;border-radius:6px;margin:8px 0'>" + formatAnswer(q) + "</p>";
    if (q.qtype === "short") {
      head += "<label class='lbl'>简答题得分</label><input type='number' class='grade-score' data-qid='" + q.question_id + "' max='" + q.max_score + "' min='0' step='0.5' value='0'>";
    } else {
      head += "<p class='hint'>客观题已自动评分</p>";
    }
    return head + "</div>";
  }).join("");
  document.getElementById("grade-body").innerHTML = html || "<p>无题目</p>";
}

document.getElementById("btn-save-grade").addEventListener("click", async function () {
  if (!gradeCtx) return;
  try {
    var grades = [...document.querySelectorAll(".grade-score")].map(function (inp) {
      return { question_id: parseInt(inp.dataset.qid, 10), score: parseFloat(inp.value) || 0 };
    });
    await api("/api/teacher/classroom-exams/" + gradeCtx.examId + "/attempts/" + gradeCtx.attemptId + "/grade", {
      method: "POST", headers: hdr(), body: JSON.stringify({ grades: grades }),
    });
    alert("批改已保存");
    await loadExams();
  } catch (e) {
    alert("保存失败：" + (e.message || e));
  }
});

})(); // IIFE
</script>
</body>
</html>
