<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>课堂在线考试 - OA-EPP</title>
<style>
  :root { --primary:#1565c0; --orange:#f57c00; --green:#2e7d32; --red:#c62828; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:"Microsoft YaHei","Noto Sans SC",sans-serif; background:#f5f5f5; color:#333; min-height:100vh; padding-bottom:env(safe-area-inset-bottom); }
  .header { background:var(--primary); color:#fff; padding:14px 16px; position:sticky; top:0; z-index:100; }
  .header h1 { font-size:1rem; font-weight:600; }
  .header p { font-size:.75rem; opacity:.85; margin-top:2px; }
  .container { max-width:640px; margin:0 auto; padding:12px; }
  .card { background:#fff; border-radius:12px; box-shadow:0 1px 4px rgba(0,0,0,.08); margin-bottom:12px; overflow:hidden; }
  .card-pad { padding:16px; }
  .exam-active { border:2px solid var(--orange); background:#fff8f0; }
  .timer { font-size:2rem; font-weight:700; color:var(--orange); font-variant-numeric:tabular-nums; text-align:right; }
  .progress-bar { height:8px; background:#e0e0e0; border-radius:4px; overflow:hidden; margin:8px 0; }
  .progress-fill { height:100%; background:var(--orange); transition:width .3s; }
  .q-nav { display:flex; flex-wrap:wrap; gap:6px; margin:10px 0; }
  .q-dot { width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:.8rem; font-weight:700; border:none; cursor:pointer; }
  .q-dot.done { background:var(--green); color:#fff; }
  .q-dot.current { background:var(--orange); color:#fff; box-shadow:0 0 0 2px #ffcc80; }
  .q-dot.todo { background:#e0e0e0; color:#666; }
  .q-type { font-size:.75rem; color:#888; }
  .q-content { font-size:1rem; line-height:1.6; margin:12px 0; }
  .opt { display:flex; gap:10px; padding:12px; border:1px solid #e0e0e0; border-radius:10px; margin-bottom:8px; cursor:pointer; align-items:flex-start; }
  .opt.selected { border-color:var(--primary); background:#e3f2fd; }
  .opt input { margin-top:3px; flex-shrink:0; }
  .blank-input, .short-input { width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; font-size:1rem; }
  .short-input { min-height:100px; resize:vertical; }
  .btn { display:inline-block; padding:12px 20px; border:none; border-radius:8px; font-size:.95rem; font-weight:600; cursor:pointer; }
  .btn-primary { background:var(--primary); color:#fff; width:100%; }
  .btn-danger { background:var(--red); color:#fff; }
  .btn-outline { background:#fff; border:1px solid #ccc; color:#555; }
  .btn-row { display:flex; gap:10px; margin-top:12px; }
  .btn-row .btn { flex:1; }
  .draft-hint { font-size:.75rem; color:#888; text-align:right; margin-top:6px; }
  .badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:.7rem; }
  .badge-active { background:#fff3e0; color:var(--orange); }
  .badge-ended { background:#f5f5f5; color:#888; }
  .score-big { font-size:2.5rem; font-weight:700; color:var(--primary); text-align:center; }
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; display:flex; align-items:flex-end; justify-content:center; padding:0; }
  @media(min-width:480px){ .modal-bg { align-items:center; padding:16px; } }
  .modal { background:#fff; border-radius:16px 16px 0 0; width:100%; max-width:420px; max-height:85vh; overflow:auto; padding:20px; }
  @media(min-width:480px){ .modal { border-radius:16px; } }
  .modal h3 { margin-bottom:12px; }
  .modal input { width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; font-size:1rem; margin-bottom:10px; }
  .cand { padding:12px; border-bottom:1px solid #f0f0f0; cursor:pointer; }
  .cand:active { background:#e3f2fd; }
  .hidden { display:none !important; }
  table { width:100%; font-size:.85rem; border-collapse:collapse; }
  th,td { padding:8px 6px; text-align:left; border-bottom:1px solid #f0f0f0; }
  .offline-banner { background:#fff3e0; color:#e65100; padding:8px 12px; font-size:.8rem; text-align:center; }
</style>
</head>
<body>
<div id="offline-banner" class="offline-banner hidden">网络已断开，答案已保存到本地，恢复后将自动同步</div>
<header class="header">
  <h1>课堂在线考试</h1>
  <p>F-S-053 · 手机浏览器作答 · 草稿自动保存</p>
</header>
<div class="container">
  <div id="view-list"></div>
  <div id="view-exam" class="hidden"></div>
  <div id="view-result" class="hidden"></div>
</div>

<div id="login-modal" class="modal-bg hidden">
  <div class="modal">
    <h3 id="login-title">确认身份</h3>
    <div id="login-msg" style="color:#c62828;font-size:.85rem;margin-bottom:8px"></div>
    <input id="name-input" type="text" placeholder="姓名 / 拼音 / 缩写" autocomplete="off">
    <div id="candidates"></div>
    <button class="btn btn-primary" id="btn-confirm" disabled>开始答题</button>
    <button class="btn btn-outline" style="width:100%;margin-top:8px" id="btn-cancel-login">取消</button>
  </div>
</div>

<script>
(function(){
  const IS_LOCAL = location.hostname === "127.0.0.1" || location.hostname === "localhost";
  const API = IS_LOCAL ? "http://127.0.0.1:8009" : "";

  let state = {
    token: null, attemptId: null, exam: null, questions: [], answers: {},
    currentIndex: 0, timerId: null, saveTimer: null, selectedStudent: null,
    pendingExamId: null, draftSavedAt: null,
  };

  const $ = id => document.getElementById(id);
  const draftKey = () => state.attemptId ? `classroom_draft_${state.attemptId}` : null;

  function loadLocalDraft() {
    const k = draftKey();
    if (!k) return;
    try {
      const raw = localStorage.getItem(k);
      if (raw) {
        const d = JSON.parse(raw);
        if (d.answers) state.answers = { ...state.answers, ...d.answers };
      }
    } catch(e) {}
  }

  function saveLocalDraft() {
    const k = draftKey();
    if (!k) return;
    localStorage.setItem(k, JSON.stringify({ answers: state.answers, savedAt: Date.now() }));
  }

  function authHeaders() {
    return { "Content-Type": "application/json", "Authorization": `Bearer ${state.token}` };
  }

  async function api(path, opts = {}) {
    const r = await fetch(API + path, opts);
    const d = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(d.detail || r.statusText);
    return d;
  }

  // ── 考试列表 ──
  async function renderList() {
    $("view-exam").classList.add("hidden");
    $("view-result").classList.add("hidden");
    $("view-list").classList.remove("hidden");
    const exams = await api("/api/classroom-exam/list");
    let html = `<div class="card card-pad"><h2 style="font-size:1rem;margin-bottom:12px">可参加的考试</h2>`;
    if (!exams.length) {
      html += `<p style="color:#888;font-size:.9rem">暂无课堂考试，请等待教师发布。</p>`;
    } else {
      exams.forEach(e => {
        const canEnter = e.status === "active";
        html += `<div class="card card-pad" style="margin:0 0 10px;border:1px solid #eee">
          <div style="display:flex;justify-content:space-between;align-items:start">
            <div><strong>${esc(e.title)}</strong><br>
            <span style="font-size:.8rem;color:#888">${e.start_at} ~ ${e.end_at}</span></div>
            <span class="badge ${canEnter?'badge-active':'badge-ended'}">${statusLabel(e.status)}</span>
          </div>
          ${canEnter ? `<button class="btn btn-primary" style="margin-top:12px" data-enter="${e.id}" data-title="${esc(e.title)}">进入考试</button>` : ""}
        </div>`;
      });
    }
    html += `</div><div class="card card-pad">
      <h3 style="font-size:.95rem;margin-bottom:8px">查询历史成绩</h3>
      <input id="hist-sid" class="blank-input" placeholder="学号" style="margin-bottom:8px">
      <button class="btn btn-outline" id="btn-hist" style="width:100%">查询</button>
      <div id="hist-result" style="margin-top:12px"></div>
    </div>`;
    $("view-list").innerHTML = html;
    $("view-list").querySelectorAll("[data-enter]").forEach(btn => {
      btn.addEventListener("click", () => openLogin(btn.dataset.enter, btn.dataset.title));
    });
    $("btn-hist").addEventListener("click", loadHistory);
  }

  function statusLabel(s) {
    return {active:"进行中",not_started:"未开始",ended:"已结束",closed:"已关闭"}[s]||s;
  }

  async function loadHistory() {
    const sid = $("hist-sid").value.trim();
    if (!sid) return;
    try {
      const rows = await api(`/api/classroom-exam/my-results?student_id=${encodeURIComponent(sid)}`);
      if (!rows.length) { $("hist-result").innerHTML = "<p style='color:#888'>暂无记录</p>"; return; }
      $("hist-result").innerHTML = `<table><tr><th>考试</th><th>得分</th><th>状态</th></tr>` +
        rows.map(r => `<tr><td>${esc(r.title)}</td><td>${r.total_score!=null?r.total_score:r.objective_score}/${r.max_score}</td>
        <td>${r.subjective_pending?"待批改":"已批改"}</td></tr>`).join("") + `</table>`;
    } catch(e) { $("hist-result").innerHTML = `<p style="color:#c62828">${e.message}</p>`; }
  }

  // ── 登录 ──
  function openLogin(examId, title) {
    state.pendingExamId = examId;
    $("login-title").textContent = "确认身份 — " + title;
    $("login-msg").textContent = "";
    $("name-input").value = "";
    $("candidates").innerHTML = "";
    state.selectedStudent = null;
    $("btn-confirm").disabled = true;
    $("login-modal").classList.remove("hidden");
    $("name-input").focus();
  }

  let searchTimer;
  $("name-input").addEventListener("input", () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(async () => {
      const q = $("name-input").value.trim();
      if (!q) { $("candidates").innerHTML = ""; return; }
      try {
        const list = await api(`/api/students/search?q=${encodeURIComponent(q)}`);
        $("candidates").innerHTML = list.map(s =>
          `<div class="cand" data-id="${s.student_id}" data-name="${esc(s.name)}">
            <strong>${esc(s.name)}</strong> <span style="color:#888;font-size:.8rem">${s.student_id}</span>
          </div>`).join("") || "<p style='padding:12px;color:#bbb'>未找到</p>";
        $("candidates").querySelectorAll(".cand").forEach(el => {
          el.addEventListener("click", () => {
            state.selectedStudent = { id: el.dataset.id, name: el.dataset.name };
            $("btn-confirm").disabled = false;
            $("candidates").querySelectorAll(".cand").forEach(c => c.style.background = "");
            el.style.background = "#e3f2fd";
          });
        });
      } catch(e) { $("login-msg").textContent = e.message; }
    }, 300);
  });

  $("btn-cancel-login").addEventListener("click", () => $("login-modal").classList.add("hidden"));
  $("btn-confirm").addEventListener("click", async () => {
    if (!state.selectedStudent || !state.pendingExamId) return;
    $("btn-confirm").disabled = true;
    try {
      const d = await api("/api/classroom-exam/verify", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ student_id: state.selectedStudent.id, exam_id: state.pendingExamId }),
      });
      $("login-modal").classList.add("hidden");
      if (d.already_submitted) {
        showResult(d);
        return;
      }
      state.token = d.token;
      state.attemptId = d.attempt_id;
      state.exam = d.exam;
      state.questions = d.questions;
      state.answers = normalizeAnswers(d.answers || {});
      loadLocalDraft();
      sessionStorage.setItem(`ce_token_${state.exam.id}`, state.token);
      startExam();
    } catch(e) {
      $("login-msg").textContent = e.message;
      $("btn-confirm").disabled = false;
    }
  });

  function normalizeAnswers(obj) {
    const out = {};
    Object.keys(obj).forEach(k => { out[parseInt(k,10)] = obj[k]; });
    return out;
  }

  // ── 答题界面 ──
  function startExam() {
    $("view-list").classList.add("hidden");
    $("view-result").classList.add("hidden");
    $("view-exam").classList.remove("hidden");
    state.currentIndex = 0;
    renderExamShell();
    renderQuestion();
    startCountdown();
    scheduleSave();
    window.addEventListener("online", flushDraft);
    window.addEventListener("offline", () => $("offline-banner").classList.remove("hidden"));
  }

  function renderExamShell() {
    const total = state.questions.length;
    const maxScore = state.questions.reduce((s,q) => s + q.score, 0);
    $("view-exam").innerHTML = `
      <div class="card exam-active card-pad" id="exam-header">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div><span class="badge badge-active">● 进行中</span>
          <h2 style="font-size:1rem;margin-top:6px">${esc(state.exam.title)}</h2>
          <p style="font-size:.8rem;color:#666">${total} 题 · 共 ${maxScore} 分</p></div>
          <div><div class="timer" id="countdown">--:--</div><div style="font-size:.7rem;color:#888;text-align:right">剩余</div></div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
        <div style="font-size:.75rem;color:#888;margin-bottom:4px"><span id="progress-text">0/${total}</span> 已作答</div>
        <div class="q-nav" id="q-nav"></div>
      </div>
      <div class="card card-pad" id="question-panel"></div>
      <div class="card card-pad">
        <p style="font-size:.8rem;color:#666;margin-bottom:10px"><strong style="color:#c62828">注意：</strong>提交后不可修改；截止时间将自动提交已答内容。考试期间无法查看他人答案。</p>
        <button class="btn btn-danger" id="btn-submit" style="width:100%">提交试卷</button>
        <div class="draft-hint" id="draft-hint"></div>
      </div>`;
    $("btn-submit").addEventListener("click", confirmSubmit);
    updateNav();
  }

  function answeredCount() {
    return state.questions.filter(q => isAnswered(q)).length;
  }

  function isAnswered(q) {
    const a = state.answers[q.id];
    if (q.qtype === "multi") return Array.isArray(a) && a.length > 0;
    if (q.qtype === "short" || q.qtype === "blank") return a != null && String(a).trim() !== "";
    return a != null && a !== "";
  }

  function updateNav() {
    const nav = $("q-nav");
    if (!nav) return;
    nav.innerHTML = state.questions.map((q,i) => {
      let cls = "q-dot todo";
      if (i === state.currentIndex) cls = "q-dot current";
      else if (isAnswered(q)) cls = "q-dot done";
      return `<button type="button" class="${cls}" data-idx="${i}">${i+1}</button>`;
    }).join("");
    nav.querySelectorAll("[data-idx]").forEach(b => {
      b.addEventListener("click", () => { state.currentIndex = +b.dataset.idx; renderQuestion(); updateNav(); });
    });
    const total = state.questions.length;
    const done = answeredCount();
    $("progress-fill").style.width = (total ? (done/total*100) : 0) + "%";
    $("progress-text").textContent = `${done}/${total}`;
  }

  const QTYPE_LABEL = { single:"单选", multi:"多选", blank:"填空", short:"简答" };

  function renderQuestion() {
    const q = state.questions[state.currentIndex];
    if (!q) return;
    let body = "";
    if (q.qtype === "single" && q.options) {
      body = q.options.map((opt, i) => {
        const letter = String.fromCharCode(65 + i);
        const sel = state.answers[q.id] === letter ? " selected" : "";
        return `<label class="opt${sel}"><input type="radio" name="q${q.id}" value="${letter}" ${sel?"checked":""}>
          <span>${letter}. ${esc(opt)}</span></label>`;
      }).join("");
    } else if (q.qtype === "multi" && q.options) {
      const sel = state.answers[q.id] || [];
      body = q.options.map((opt, i) => {
        const letter = String.fromCharCode(65 + i);
        const on = sel.includes(letter);
        return `<label class="opt${on?" selected":""}"><input type="checkbox" value="${letter}" ${on?"checked":""}>
          <span>${letter}. ${esc(opt)}</span></label>`;
      }).join("");
    } else if (q.qtype === "blank") {
      body = `<input class="blank-input" id="ans-input" placeholder="请输入答案" value="${esc(state.answers[q.id]||"")}">`;
    } else if (q.qtype === "short") {
      body = `<textarea class="short-input" id="ans-input" placeholder="请输入简答">${esc(state.answers[q.id]||"")}</textarea>`;
    }

    $("question-panel").innerHTML = `
      <div class="q-type">第 ${state.currentIndex+1} 题 · ${QTYPE_LABEL[q.qtype]} · ${q.score} 分</div>
      <div class="q-content">${esc(q.content)}</div>
      ${body}
      <div class="btn-row">
        <button class="btn btn-outline" id="btn-prev" ${state.currentIndex===0?"disabled":""}>上一题</button>
        <button class="btn btn-primary" id="btn-next">${state.currentIndex===state.questions.length-1?"最后一题":"下一题"}</button>
      </div>`;

    bindQuestionInputs(q);
    $("btn-prev").addEventListener("click", () => { if(state.currentIndex>0){state.currentIndex--;renderQuestion();updateNav();}});
    $("btn-next").addEventListener("click", () => {
      if (state.currentIndex < state.questions.length-1) { state.currentIndex++; renderQuestion(); updateNav(); }
    });
    updateNav();
  }

  function bindQuestionInputs(q) {
    if (q.qtype === "single") {
      $("question-panel").querySelectorAll('input[type=radio]').forEach(inp => {
        inp.addEventListener("change", () => { state.answers[q.id] = inp.value; onAnswerChange(); });
      });
    } else if (q.qtype === "multi") {
      $("question-panel").querySelectorAll('input[type=checkbox]').forEach(inp => {
        inp.addEventListener("change", () => {
          const vals = [...$("question-panel").querySelectorAll('input:checked')].map(x => x.value);
          state.answers[q.id] = vals;
          onAnswerChange();
        });
      });
    } else {
      const inp = $("ans-input");
      if (inp) {
        inp.addEventListener("input", () => { state.answers[q.id] = inp.value; debounceSave(); });
      }
    }
  }

  let debounceTimer;
  function onAnswerChange() {
    updateNav();
    saveLocalDraft();
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(flushDraft, 800);
  }

  function debounceSave() { onAnswerChange(); }

  function scheduleSave() {
    if (state.saveTimer) clearInterval(state.saveTimer);
    state.saveTimer = setInterval(flushDraft, 5000);
  }

  async function flushDraft() {
    if (!state.token) return;
    saveLocalDraft();
    try {
      const d = await api("/api/classroom-exam/draft", {
        method: "PUT",
        headers: authHeaders(),
        body: JSON.stringify({ answers: state.answers }),
      });
      $("offline-banner").classList.add("hidden");
      if (d.auto_submitted) {
        clearInterval(state.saveTimer);
        showResult(d);
        return;
      }
      if ($("draft-hint")) $("draft-hint").textContent = "草稿已同步 " + (d.draft_saved_at || "");
    } catch(e) {
      if (!navigator.onLine) $("offline-banner").classList.remove("hidden");
    }
  }

  function startCountdown() {
    if (state.timerId) clearInterval(state.timerId);
    const end = new Date(state.exam.end_at.replace(" ", "T")).getTime();
    function tick() {
      const left = Math.max(0, end - Date.now());
      const m = Math.floor(left/60000), s = Math.floor((left%60000)/1000);
      const el = $("countdown");
      if (el) el.textContent = `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
      if (left <= 0) { clearInterval(state.timerId); autoSubmit(); }
    }
    tick();
    state.timerId = setInterval(tick, 1000);
  }

  async function autoSubmit() {
    try {
      const d = await api("/api/classroom-exam/submit", { method: "POST", headers: authHeaders() });
      showResult(d);
    } catch(e) {
      alert("自动提交失败：" + e.message + "，请检查网络后重试");
    }
  }

  function confirmSubmit() {
    const missing = state.questions.length - answeredCount();
    const msg = missing > 0
      ? `还有 ${missing} 题未作答，确定提交吗？`
      : "确定提交试卷吗？提交后不可修改。";
    if (confirm(msg)) doSubmit();
  }

  async function doSubmit() {
    await flushDraft();
    try {
      const d = await api("/api/classroom-exam/submit", { method: "POST", headers: authHeaders() });
      if (state.saveTimer) clearInterval(state.saveTimer);
      if (state.timerId) clearInterval(state.timerId);
      const k = draftKey();
      if (k) localStorage.removeItem(k);
      showResult(d);
    } catch(e) { alert(e.message); }
  }

  function showResult(d) {
    $("view-list").classList.add("hidden");
    $("view-exam").classList.add("hidden");
    $("view-result").classList.remove("hidden");
    const pending = d.subjective_pending > 0;
    const score = d.total_score != null ? d.total_score : d.objective_score;
    $("view-result").innerHTML = `
      <div class="card card-pad" style="text-align:center">
        <h2 style="margin-bottom:8px">${esc(d.title || state.exam?.title || "考试")}</h2>
        ${d.auto_submitted ? `<p style="color:#e65100;font-size:.85rem">已到达截止时间，系统自动提交</p>` : ""}
        <div class="score-big">${score != null ? score : "—"}</div>
        <p style="color:#666">满分 ${d.max_score} 分</p>
        ${pending ? `<p style="margin-top:12px;color:#f57c00">主观题待教师批改，客观题已计 ${d.objective_score} 分</p>` :
          `<p style="margin-top:8px;color:#2e7d32">批改完成</p>`}
        <button class="btn btn-primary" style="margin-top:16px" id="btn-back">返回列表</button>
      </div>`;
    $("btn-back").addEventListener("click", () => { state.token=null; renderList(); });
  }

  function esc(s) {
    return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");
  }

  renderList().catch(e => {
    $("view-list").innerHTML = `<div class="card card-pad"><p style="color:#c62828">加载失败：${e.message}</p></div>`;
  });
})();
</script>
</body>
