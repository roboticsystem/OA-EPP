  <main class="ml-56 flex-1 p-8 min-h-screen">
    <div class="mb-6">
      <a href="/courses" class="text-xs text-blue-600 hover:underline flex items-center gap-1 mb-2">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>返回课程列表
      </a>
      <h1 class="text-xl font-bold text-gray-800" id="course-title">课程详情</h1>
      <div class="flex flex-wrap items-center gap-x-4 gap-y-1 mt-1">
        <p class="text-sm text-gray-400" id="course-meta"></p>
        <span class="text-xs text-gray-400" id="course-deadline-reminder"></span>
      </div>
      <!-- 进度条 -->
      <div class="mt-3 flex items-center gap-3">
        <div class="flex-1 bg-gray-100 rounded-full h-2.5 max-w-md">
          <div id="course-progress-bar" class="bg-blue-600 h-2.5 rounded-full transition-all" style="width:0%"></div>
        </div>
        <span class="text-xs text-gray-500" id="course-progress-text">0%</span>
      </div>
    </div>

    <div id="chapter-list" class="space-y-3">
      <!-- JS 渲染 -->
    </div>
  </main>

  <script>
  var API = '';
  var params = new URLSearchParams(window.location.search);
  var courseId = params.get('id') || 'EP4';

  function getTypeColor(t) { return {'考试':'bg-red-100 text-red-600','作业':'bg-blue-100 text-blue-600','签到':'bg-green-100 text-green-600'}[t] || 'bg-gray-100 text-gray-500'; }
  function getStatusColor(s) { return {'已完成':'bg-green-100 text-green-600','进行中':'bg-blue-100 text-blue-600','待开始':'bg-gray-100 text-gray-500','未通过':'bg-red-100 text-red-600'}[s] || 'bg-gray-100 text-gray-500'; }

  async function loadCourse() {
    try {
      var r = await fetch(API + '/api/courses/' + courseId + '/chapters');
      var d = await r.json();
      var course = d.course;
      var chapters = d.chapters;
      document.getElementById('course-title').textContent = course.title;
      document.getElementById('course-meta').textContent = course.semester + ' · 总分 ' + (course.total_score || 100) + ' 分 · 共 ' + chapters.length + ' 章';
      if (course.deadline_reminder) {
        document.getElementById('course-deadline-reminder').textContent = '⏰ ' + course.deadline_reminder;
      }
      var done = chapters.filter(function(c) { return c.status === '已完成'; }).length;
      var pct = chapters.length > 0 ? Math.round(done / chapters.length * 100) : 0;
      document.getElementById('course-progress-bar').style.width = pct + '%';
      document.getElementById('course-progress-text').textContent = done + '/' + chapters.length + ' 已完成 (' + pct + '%)';
      renderChapters(chapters);
    } catch(e) {
      document.getElementById('chapter-list').innerHTML = '<div class="text-center py-12 text-sm text-gray-400">加载课程数据失败</div>';
    }
  }

  function renderChapters(chapters) {
    var container = document.getElementById('chapter-list');
    if (!chapters.length) { container.innerHTML = '<div class="text-center py-12 text-sm text-gray-400">暂无章节数据</div>'; return; }
    var now = new Date();
    var html = '';
    for (var i = 0; i < chapters.length; i++) {
      var ch = chapters[i];
      var dl = ch.deadline ? '<span class="' + (new Date(ch.deadline.replace(' ', 'T')) < now ? 'text-red-500' : 'text-gray-600') + '">' + ch.deadline + '</span>' : '<span class="text-gray-400">待定</span>';
      var chapterUrl = '/chapter?id=' + ch.id;
      html += '<div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden hover:shadow-md transition">'
        + '<div class="flex items-center justify-between px-6 py-4 bg-gray-50 border-b border-gray-100">'
        + '<div class="flex items-center gap-3">'
        + '<span class="w-8 h-8 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center text-sm font-bold">' + ch.chapter_no + '</span>'
        + '<div><h3 class="text-sm font-semibold text-gray-800">' + ch.title + '</h3>'
        + '<p class="text-xs text-gray-400 mt-0.5">截止：' + dl + '</p></div></div>'
        + '<div class="flex items-center gap-2 flex-shrink-0">'
        + '<span class="text-xs px-2 py-0.5 rounded-full font-medium ' + getTypeColor(ch.chapter_type) + '">' + ch.chapter_type + '</span>'
        + '<span class="text-xs px-2 py-0.5 rounded-full font-medium ' + getStatusColor(ch.status) + '">' + ch.status + '</span>'
        + '<a href="' + chapterUrl + '" class="text-xs bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-lg transition ml-2">查看详情 →</a>'
        + '</div></div>'
        + '<div class="px-6 py-3 flex items-center justify-between text-xs">'
        + '<span class="text-gray-500">评分标准：' + (ch.grading_criteria || '见文档') + '</span>'
        + '</div></div>';
    }
    container.innerHTML = html;
  }

  loadCourse();
  </script>
