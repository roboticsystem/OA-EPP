      <a href="courses.html" class="flex items-center gap-3 px-3 py-2 rounded-lg bg-blue-50 text-blue-700 font-medium text-sm"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>课程学习</a>
      <a href="assignments.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50 text-sm"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>作业提交</a>

      <a href="attendance.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50 text-sm"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>课堂签到</a>
      <a href="exam.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50 text-sm"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>在线考试</a>
      <a href="profile.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50 text-sm"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>个人资料</a>
    </nav>
    <div class="px-4 py-4 border-t border-gray-100">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 font-bold text-sm">张</div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-gray-800 truncate">张三（学生）</p>
          <p class="text-xs text-gray-400 truncate">2024001</p>
        </div>
      </div>
      <a href="login.html" class="mt-3 block text-center text-xs text-gray-400 hover:text-red-500 transition">退出登录</a>
    </div>
  </aside>

  <main class="ml-56 flex-1 p-8 min-h-screen">
    <div class="mb-6">
      <h1 class="text-xl font-bold text-gray-800">课程学习</h1>
      <p class="text-sm text-gray-400 mt-0.5">查看所有工程实践课程与各学期章节明细</p>
    </div>

    <div id="course-cards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8"></div>

    <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
      <div id="chapter-header" class="flex items-center justify-between px-6 py-4 border-b border-gray-100 bg-blue-50">
        <div>
          <h2 class="text-base font-bold text-gray-800" id="chapter-title">章节明细</h2>
          <p class="text-xs text-gray-500 mt-0.5" id="chapter-subtitle">点击上方课程卡片查看章节</p>
        </div>
        <span class="text-xs bg-blue-100 text-blue-700 px-3 py-1 rounded-full font-medium" id="chapter-count"></span>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-50 text-left text-xs text-gray-500 uppercase tracking-wider">
              <th class="px-6 py-3 font-medium">章节号</th>
              <th class="px-6 py-3 font-medium">章节名</th>
              <th class="px-6 py-3 font-medium">类型</th>
              <th class="px-6 py-3 font-medium">截止时间</th>
              <th class="px-6 py-3 font-medium">状态</th>
              <th class="px-6 py-3 font-medium">操作</th>
            </tr>
          </thead>
          <tbody id="chapter-body" class="divide-y divide-gray-100"></tbody>
        </table>
      </div>
      <div id="chapter-empty" class="hidden px-6 py-12 text-center text-sm text-gray-400">暂无章节数据</div>
    </div>
  </main>

  <script>
  var API = '';

  function buildCard(c) {
    var pct = c.total_chapters > 0 ? Math.round(c.completed_chapters / c.total_chapters * 100) : 0;
    var cur = c.id === 'EP4';
    var statusBadge = cur
      ? '<span class="text-xs bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full font-medium">当前</span>'
      : '<span class="text-xs bg-green-100 text-green-600 px-2 py-0.5 rounded-full">已完成</span>';
    var barColor = cur ? 'bg-blue-600' : 'bg-green-500';
    var footerHtml;
    if (c.deadline_reminder) {
      footerHtml = '<p class="mt-2 text-xs text-orange-500 flex items-center gap-1">'
        + '<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'
        + c.deadline_reminder + '</p>';
    } else if (!cur) {
      footerHtml = '<p class="mt-2 text-xs text-green-500 flex items-center gap-1">'
        + '<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'
        + '全部完成</p>';
    } else {
      footerHtml = '<p class="mt-2 text-xs text-blue-500 flex items-center gap-1">点击查看章节</p>';
    }
    var border = cur ? 'border-blue-300' : 'border-gray-200';
    return '<div class="bg-white rounded-xl border ' + border + ' shadow-sm p-5 hover:shadow-md transition cursor-pointer" data-cid="' + c.id + '" data-ctitle="' + c.title + '" onclick="loadChapters(this)">'
      + '<div class="flex items-center justify-between mb-2">'
      + '<h3 class="text-sm font-bold text-gray-800">' + c.title + '</h3>' + statusBadge + '</div>'
      + '<div class="flex items-center gap-1 mb-3"><span class="text-lg font-bold text-blue-600">' + (c.total_score || 100) + '</span><span class="text-xs text-gray-400">分</span></div>'
      + '<div class="space-y-2 text-xs text-gray-500 mb-3">'
      + '<div class="flex justify-between"><span>章节数</span><span class="font-medium text-gray-700">' + (c.total_chapters || 0) + '</span></div>'
      + '<div class="flex justify-between"><span>已完成</span><span class="font-medium text-gray-700">' + (c.completed_chapters || 0) + '/' + (c.total_chapters || 0) + '</span></div></div>'
      + '<div class="w-full bg-gray-100 rounded-full h-2"><div class="' + barColor + ' h-2 rounded-full" style="width:' + pct + '%"></div></div>'
      + '<div class="flex justify-between mt-1"><span class="text-xs text-gray-400">进度</span><span class="text-xs font-medium text-gray-600">' + pct + '%</span></div>'
      + footerHtml + '</div>';
  }

  async function loadCourses() {
    try {
      var r = await fetch(API + '/api/courses');
      var courses = await r.json();
      var container = document.getElementById('course-cards');
      if (!courses.length) {
        container.innerHTML = '<div class="col-span-4 text-center py-8 text-sm text-gray-400">暂无课程数据</div>';
        return;
      }
      container.innerHTML = courses.map(buildCard).join('');
      var ep4 = courses.find(function(c) { return c.id === 'EP4'; });
      if (ep4) loadChaptersByCid('EP4', ep4.title);
    } catch(e) {
      document.getElementById('course-cards').innerHTML =
        '<div class="col-span-4 text-center py-8 text-sm text-gray-400">加载课程数据失败</div>';
    }
  }

  function loadChaptersByCid(cid, title) {
    document.getElementById('chapter-title').textContent = title + ' — 章节明细';
    document.getElementById('chapter-subtitle').textContent = title + ' · 章节明细';
    loadChaptersData(cid, title);
  }

  async function loadChaptersData(cid, title) {
    try {
      var r = await fetch(API + '/api/courses/' + cid + '/chapters');
      var d = await r.json();
      renderTable(d.chapters, d.course);
    } catch(e) {
      document.getElementById('chapter-body').innerHTML =
        '<tr><td colspan="6" class="px-6 py-8 text-center text-sm text-gray-400">加载章节数据失败</td></tr>';
    }
  }

  function loadChapters(el) {
    var cid = el.getAttribute('data-cid');
    var title = el.getAttribute('data-ctitle');
    document.getElementById('chapter-title').textContent = title + ' — 章节明细';
    document.getElementById('chapter-subtitle').textContent = title + ' · 章节明细';
    document.querySelectorAll('#course-cards > div').forEach(function(e) {
      e.classList.remove('ring-2', 'ring-blue-200');
    });
    el.classList.add('ring-2', 'ring-blue-200');
    loadChaptersData(cid, title);
  }

  function renderTable(chapters, course) {
    var tbody = document.getElementById('chapter-body');
    var empty = document.getElementById('chapter-empty');
    if (!chapters.length) {
      tbody.innerHTML = '';
      empty.classList.remove('hidden');
      return;
    }
    empty.classList.add('hidden');

    var typeColors = {'考试':'bg-red-100 text-red-600','作业':'bg-blue-100 text-blue-600','签到':'bg-green-100 text-green-600'};
    var statusColors = {'已完成':'bg-green-100 text-green-600','进行中':'bg-blue-100 text-blue-600','待开始':'bg-gray-100 text-gray-500','未通过':'bg-red-100 text-red-600'};
    var now = new Date();
    var rows = [];

    for (var i = 0; i < chapters.length; i++) {
      var ch = chapters[i];
      var tc = typeColors[ch.chapter_type] || 'bg-gray-100 text-gray-500';
      var sc = statusColors[ch.status] || 'bg-gray-100 text-gray-500';
      var dlHtml;
      if (ch.deadline) {
        var d = new Date(ch.deadline.replace(' ', 'T'));
        dlHtml = '<span class="' + (d < now ? 'text-red-500 font-medium' : 'text-gray-600') + '">' + ch.deadline + '</span>';
      } else {
        dlHtml = '<span class="text-gray-400">待定</span>';
      }
      var detailUrl = '/chapter?id=' + ch.id;
      rows.push('<tr class="hover:bg-gray-50 transition cursor-pointer" onclick="window.location.href=\'' + detailUrl + '\'">'
        + '<td class="px-6 py-4 text-gray-700 font-medium">' + ch.chapter_no + '</td>'
        + '<td class="px-6 py-4 text-gray-800">' + ch.title + '</td>'
        + '<td class="px-6 py-4"><span class="text-xs px-2 py-0.5 rounded-full font-medium ' + tc + '">' + ch.chapter_type + '</span></td>'
        + '<td class="px-6 py-4 text-xs">' + dlHtml + '</td>'
        + '<td class="px-6 py-4"><span class="text-xs px-2 py-0.5 rounded-full font-medium ' + sc + '">' + ch.status + '</span></td>'
        + '<td class="px-6 py-4 text-xs"><a href="' + detailUrl + '" class="text-blue-600 hover:underline">查看详情</a></td>'
        + '</tr>');
    }

    tbody.innerHTML = rows.join('');
    var done = chapters.filter(function(c) { return c.status === '已完成'; }).length;
    document.getElementById('chapter-count').textContent = done + '/' + chapters.length + ' 章已完成';

    if (course) {
      document.querySelectorAll('#course-cards > div').forEach(function(el) {
        el.classList.remove('ring-2', 'ring-blue-200');
        var h3 = el.querySelector('h3');
        if (h3 && h3.textContent === course.title) {
          el.classList.add('ring-2', 'ring-blue-200');
        }
      });
    }
  }

  loadCourses();
  </script>
</body>
