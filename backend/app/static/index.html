<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>研究生课程《机器人系统》— 作业考试平台</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Microsoft YaHei","Noto Sans SC",sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .wrapper { max-width: 520px; width: 90%; text-align: center; }
  .logo { font-size: 3rem; margin-bottom: 8px; }
  h1 { color: #fff; font-size: 1.5rem; margin-bottom: 6px; }
  .subtitle { color: rgba(255,255,255,.75); font-size: .9rem; margin-bottom: 36px; }
  .cards { display: flex; flex-direction: column; gap: 14px; }
  .card { background: #fff; border-radius: 12px; padding: 24px 20px; text-decoration: none; color: #333; display: flex; align-items: center; gap: 16px; transition: transform .2s, box-shadow .2s; box-shadow: 0 4px 15px rgba(0,0,0,.12); }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,.18); }
  .card-icon { font-size: 2.2rem; min-width: 50px; text-align: center; }
  .card-info { text-align: left; flex: 1; }
  .card-info h3 { font-size: 1.05rem; margin-bottom: 4px; color: #1565c0; }
  .card-info p { font-size: .82rem; color: #888; line-height: 1.4; }
  .card-arrow { color: #bbb; font-size: 1.2rem; }
  .footer { color: rgba(255,255,255,.55); font-size: .78rem; margin-top: 32px; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="logo">🤖</div>
  <h1>研究生课程《机器人系统》</h1>
  <p class="subtitle">作业提交与考试管理系统</p>

  <div class="cards">
    <a class="card" href="/teacher">
      <div class="card-icon">👨‍🏫</div>
      <div class="card-info">
        <h3>教师管理后台</h3>
        <p>学生名单管理 · 考试发布 · 成绩导出</p>
      </div>
      <span class="card-arrow">→</span>
    </a>

    <a class="card" href="/teacher/progress">
      <div class="card-icon">📊</div>
      <div class="card-info">
        <h3>进度看板</h3>
        <p>热力图 · 完成率趋势 · 实时刷新</p>
      </div>
      <span class="card-arrow">→</span>
    </a>

    <a class="card" href="/score">
      <div class="card-icon">📝</div>
      <div class="card-info">
        <h3>学生成绩查询</h3>
        <p>按姓名搜索 · 查看个人成绩</p>
      </div>
      <span class="card-arrow">→</span>
    </a>
  </div>

  <p class="footer">© 2025 研究生课程《机器人系统》教学团队</p>
</div>
</body>
</html>
