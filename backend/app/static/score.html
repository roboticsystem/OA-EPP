<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学生登录与成绩查询 — 研究生课程《机器人系统》</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Microsoft YaHei", "Noto Sans SC", sans-serif; background: #f0f4f8; color: #333; min-height: 100vh; }
  .header { background: #1565c0; color: #fff; padding: 16px 24px; }
  .header h1 { font-size: 1.2rem; }
  .header p { font-size: .85rem; opacity: .85; margin-top: 4px; }
  .container { max-width: 680px; margin: 32px auto; padding: 0 16px; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.1); overflow: hidden; margin-bottom: 20px; }
  .panel { padding: 28px; }
  .panel h2 { font-size: 1.1rem; margin-bottom: 16px; color: #1565c0; }
  .input-column { display: flex; flex-direction: column; gap: 12px; }
  input[type=text], input[type=password] { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
  input[type=text]:focus, input[type=password]:focus { outline: none; border-color: #1565c0; box-shadow: 0 0 0 3px rgba(21,101,192,.1); }
  .btn { padding: 12px 24px; background: #1565c0; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; white-space: nowrap; }
  .btn:hover { background: #0d47a1; }
  .btn-danger { background: #d32f2f; }
  .btn-danger:hover { background: #b71c1c; }
  .status-line { font-size: .9rem; color: #888; margin-top: 10px; }
  .hint { font-size: .85rem; color: #888; margin-top: 10px; text-align: center; }
  .empty { padding: 32px; text-align: center; color: #bbb; }
  .student-info { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
  .avatar { width: 48px; height: 48px; background: #1565c0; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: bold; flex-shrink: 0; }
  .student-detail h3 { font-size: 1.1rem; }
  .student-detail p { font-size: .88rem; color: #888; margin-top: 2px; }
  .score-list { display: flex; flex-direction: column; gap: 10px; }
  .score-item { border: 1px solid #e0e0e0; border-radius: 8px; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; }
  .score-item.submitted { border-color: #a5d6a7; background: #f1f8e9; }
  .score-item.pending { opacity: .65; }
  .exam-title { font-weight: bold; font-size: .95rem; }
  .exam-time { font-size: .8rem; color: #888; margin-top: 2px; }
  .score-badge { text-align: right; }
  .score-value { font-size: 1.4rem; font-weight: bold; color: #1565c0; }
  .score-total { font-size: .85rem; color: #888; }
  .score-pending { font-size: .9rem; color: #bbb; }
  @media (max-width: 560px) {
    .student-info { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="header">
  <h1>📊 学生成绩查询</h1>
  <p>研究生课程《机器人系统》 — 成都信息工程大学软件工程学院</p>
</div>
<div class="container">
  <div id="login-card" class="card">
    <div class="panel">
      <h2>🔐 学生登录</h2>
      <div class="input-column">
        <input type="text" id="identifier" placeholder="请输入学号或邮箱" onkeydown="if(event.key==='Enter')doLogin()">
        <input type="password" id="password" placeholder="请输入密码" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
        <button class="btn" onclick="doLogin()">登录</button>
        <span id="login-msg" class="status-line"></span>
      </div>
      <p class="hint">首次登录默认密码为学号；连续登录失败 5 次后会暂时锁定账户 5 分钟。</p>
    </div>
  </div>

  <div id="results-card" class="card" style="display:none;">
    <div class="panel">
      <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:20px;">
        <div>
          <div style="font-size:1rem; color:#1565c0;">已登录：<span id="user-name"></span></div>
          <div style="font-size:.9rem; color:#888;" id="user-meta"></div>
        </div>
        <button class="btn btn-danger" onclick="logout()">退出登录</button>
      </div>

      <div class="student-info">
        <div class="avatar" id="avatar-text">?</div>
        <div class="student-detail">
          <h3 id="result-name"></h3>
          <p id="result-meta"></p>
        </div>
      </div>
      <div class="score-list" id="score-list"></div>
      <p class="hint">成绩由服务器记录，如有疑问请联系授课教师。</p>
    </div>
  </div>

  <!-- 公告通知模块 -->
  <div id="notif-module" class="card" style="display:none">
    <div class="notif-section" style="padding:4px 20px 20px 20px;">
      <div class="notif-header" id="notif-toggle" onclick="toggleNotifications()">
        <span style="font-weight:bold;font-size:.95rem;">📢 公告与通知</span>
        <span id="notif-badge-wrap" style="display:none"><span class="badge-unread" id="notif-badge">0</span></span>
      </div>
      <div class="notif-list-wrap" id="notif-list-wrap">
        <div class="notif-tabs" id="notif-tabs">
          <button class="notif-tab active" data-cat="all" onclick="switchNotifCat('all')">全部</button>
          <button class="notif-tab" data-cat="announcement" onclick="switchNotifCat('announcement')">📋 公告</button>
          <button class="notif-tab" data-cat="deadline" onclick="switchNotifCat('deadline')">⏰ 截止提醒</button>
          <button class="notif-tab" data-cat="grade" onclick="switchNotifCat('grade')">📊 成绩通知</button>
        </div>
        <div id="notif-list" style="max-height:360px;overflow-y:auto;">加载中…</div>
        <button class="btn" style="margin-top:10px;width:100%;background:#e0e0e0;color:#333;font-size:.85rem" onclick="markAllNotificationsRead()">全部标记已读</button>
      </div>
    </div>
  </div>
</div>

<script>
const API = '';
let currentToken = '';

function showMessage(msg, isError = false) {
  const el = document.getElementById('login-msg');
  el.textContent = msg;
  el.style.color = isError ? '#d32f2f' : '#1565c0';
}

function showLogin() {
  document.getElementById('login-card').style.display = 'block';
  document.getElementById('results-card').style.display = 'none';
  showMessage('');
}

function showResultsCard() {
  document.getElementById('login-card').style.display = 'none';
  document.getElementById('results-card').style.display = 'block';
}

async function init() {
  const token = sessionStorage.getItem('student_token');
  if (token) {
    currentToken = token;
    await loadProfile();
  } else {
    showLogin();
  }
}

async function loadProfile() {
  try {
    const resp = await fetch(`${API}/api/auth/me`, {
      headers: { Authorization: `Bearer ${currentToken}` },
    });
    if (!resp.ok) {
      sessionStorage.removeItem('student_token');
      showLogin();
      return;
    }
    const profile = await resp.json();
    document.getElementById('user-name').textContent = profile.name;
    document.getElementById('user-meta').textContent = `学号：${profile.student_id}`;
    await fetchScores(profile.student_id, profile.name, profile.class_name || '');
  } catch (err) {
    showLogin();
  }
}

async function doLogin() {
  const identifier = document.getElementById('identifier').value.trim();
  const password = document.getElementById('password').value;
  if (!identifier || !password) {
    showMessage('请填写学号/邮箱和密码', true);
    return;
  }
  showMessage('正在登录...');
  try {
    const resp = await fetch(`${API}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ identifier, password }),
    });
    const data = await resp.json();
    if (!resp.ok) {
      showMessage(data.detail || '登录失败，请检查学号/邮箱和密码', true);
      return;
    }
    currentToken = data.token;
    sessionStorage.setItem('student_token', currentToken);
    document.getElementById('user-name').textContent = data.name;
    document.getElementById('user-meta').textContent = `学号：${data.student_id}${data.class_name ? ' · ' + data.class_name : ''}`;
    await fetchScores(data.student_id, data.name, data.class_name || '');
  } catch (err) {
    showMessage('网络错误，请稍后再试', true);
  }
}

async function fetchScores(studentId, studentName, className) {
  try {
    const resp = await fetch(`${API}/api/scores?student_id=${encodeURIComponent(studentId)}`, {
      headers: { Authorization: `Bearer ${currentToken}` },
    });
    if (!resp.ok) {
      showMessage('无法获取成绩，请稍后重试', true);
      return;
    }
    const data = await resp.json();
    renderResults({
      student: {
        name: studentName,
        student_id: studentId,
        class_name: className,
      },
      scores: data.scores || [],
    });
  } catch (err) {
    showMessage('网络错误，请稍后再试', true);
  }
}

function renderResults(data) {
  showResultsCard();
  const s = data.student;
  document.getElementById('avatar-text').textContent = s.name ? s.name.slice(-1) : '?';
  document.getElementById('result-name').textContent = s.name || '学生';
  document.getElementById('result-meta').textContent = `学号：${s.student_id}${s.class_name ? ' · ' + s.class_name : ''}`;

  if (!data.scores || !data.scores.length) {
    document.getElementById('score-list').innerHTML = '<div class="empty">当前暂无成绩记录。</div>';
    return;
  }

  const scoreHtml = data.scores.map(item => {
    if (item.score !== null && item.score !== undefined) {
      return `
        <div class="score-item submitted">
          <div>
            <div class="exam-title">${item.exam_title}</div>
            <div class="exam-time">${item.submitted_at || ''}</div>
          </div>
          <div class="score-badge">
            <div class="score-value">${item.score}</div>
            <div class="score-total">/ ${item.total} 分</div>
          </div>
        </div>`;
    }
    return `
        <div class="score-item pending">
          <div><div class="exam-title">${item.exam_title}</div></div>
          <div class="score-pending">未参加</div>
        </div>`;
  }).join('');

  document.getElementById('score-list').innerHTML = scoreHtml;
}

function logout() {
  sessionStorage.removeItem('student_token');
  currentToken = '';
  document.getElementById('identifier').value = '';
  document.getElementById('password').value = '';
  showLogin();
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
