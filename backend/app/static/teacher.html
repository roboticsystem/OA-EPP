<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教师管理后台 — 研究生课程《机器人系统》</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Microsoft YaHei", "Noto Sans SC", sans-serif; background: #f5f5f5; color: #333; }
  .header { background: #1565c0; color: #fff; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 1.2rem; }
  .header button { background: rgba(255,255,255,.2); color: #fff; border: 1px solid rgba(255,255,255,.5); padding: 6px 16px; border-radius: 4px; cursor: pointer; }
  .header button:hover { background: rgba(255,255,255,.35); }
  .container { max-width: 1000px; margin: 24px auto; padding: 0 16px; }
  .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.12); margin-bottom: 20px; overflow: hidden; }
  .card-title { background: #e3f2fd; padding: 12px 20px; font-weight: bold; font-size: .95rem; border-bottom: 1px solid #bbdefb; display: flex; align-items: center; justify-content: space-between; }
  .card-body { padding: 20px; }
  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-box { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,.15); width: 340px; text-align: center; }
  .login-box h2 { margin-bottom: 8px; color: #1565c0; }
  .login-box p { color: #888; margin-bottom: 24px; font-size: .9rem; }
  input[type=text], input[type=password], input[type=file] { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; margin-bottom: 12px; }
  input[type=text]:focus, input[type=password]:focus { outline: none; border-color: #1565c0; }
  .btn { display: inline-block; padding: 10px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: .95rem; font-weight: bold; }
  .btn-primary { background: #1565c0; color: #fff; }
  .btn-primary:hover { background: #0d47a1; }
  .btn-success { background: #2e7d32; color: #fff; }
  .btn-success:hover { background: #1b5e20; }
  .btn-danger { background: #c62828; color: #fff; }
  .btn-danger:hover { background: #b71c1c; }
  .btn-warning { background: #e65100; color: #fff; }
  .btn-warning:hover { background: #bf360c; }
  .btn-outline { background: transparent; color: #1565c0; border: 1px solid #1565c0; }
  .btn-outline:hover { background: #e3f2fd; }
  .btn-outline-danger { background: transparent; color: #c62828; border: 1px solid #c62828; }
  .btn-outline-danger:hover { background: #ffebee; }
  .btn-sm { padding: 6px 14px; font-size: .85rem; }
  .btn-full { width: 100%; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .stat-item { background: #f8f9fa; border-radius: 8px; padding: 16px; text-align: center; }
  .stat-value { font-size: 1.8rem; font-weight: bold; color: #1565c0; }
  .stat-label { font-size: .8rem; color: #888; margin-top: 4px; }
  .exam-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .exam-tab { padding: 6px 16px; border-radius: 20px; border: 1px solid #1565c0; color: #1565c0; cursor: pointer; font-size: .9rem; background: #fff; }
  .exam-tab.active { background: #1565c0; color: #fff; }
  table { width: 100%; border-collapse: collapse; font-size: .9rem; }
  th { background: #e3f2fd; padding: 10px 12px; text-align: left; font-weight: bold; }
  td { padding: 9px 12px; border-bottom: 1px solid #f0f0f0; }
  tr:hover td { background: #fafafa; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: .8rem; }
  .badge-green { background: #e8f5e9; color: #2e7d32; }
  .badge-gray { background: #f5f5f5; color: #888; }
  .upload-area { border: 2px dashed #bbdefb; border-radius: 8px; padding: 24px; text-align: center; cursor: pointer; transition: border-color .2s; }
  .upload-area:hover { border-color: #1565c0; }
  .upload-area input { display: none; }
  .upload-hint { color: #888; font-size: .9rem; margin-top: 8px; }
  .alert { padding: 12px 16px; border-radius: 6px; margin-bottom: 12px; font-size: .9rem; }
  .alert-success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
  .alert-error { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
  .flex-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .toggle-switch { display: flex; align-items: center; gap: 8px; }
  .switch { position: relative; width: 42px; height: 24px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: #ccc; border-radius: 24px; cursor: pointer; transition: .3s; }
  .slider:before { content: ""; position: absolute; width: 18px; height: 18px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .3s; }
  input:checked + .slider { background: #1565c0; }
  input:checked + .slider:before { transform: translateX(18px); }
  /* 添加学生表单 */
  .add-form { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 8px; align-items: end; }
  .add-form input { margin-bottom: 0; }
  .form-label { font-size: .8rem; color: #555; margin-bottom: 4px; display: block; }
  /* 确认弹窗 */
  .confirm-dialog-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 9999; display: flex; align-items: center; justify-content: center; }
  .confirm-dialog { background: #fff; border-radius: 10px; padding: 28px 24px; max-width: 400px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,.2); text-align: center; }
  .confirm-dialog h3 { margin-bottom: 10px; }
  .confirm-dialog p { color: #666; font-size: .9rem; margin-bottom: 20px; line-height: 1.6; }
  .confirm-dialog .btn-row { display: flex; gap: 10px; justify-content: center; }
  #app { display: none; }
</style>
</head>
<body>

<!-- 登录页 -->
<div id="login-page" class="login-wrap">
  <div class="login-box">
    <h2>🎓 教师管理后台</h2>
    <p>研究生课程《机器人系统》考试系统</p>
    <div id="login-msg"></div>
    <input type="password" id="login-pwd" placeholder="请输入教师密码" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-primary btn-full" onclick="doLogin()">登 录</button>
  </div>
</div>

<!-- 主界面 -->
<div id="app">
  <div class="header">
    <h1>🎓 教师管理后台 — 研究生课程《机器人系统》</h1>
    <button onclick="logout()">退出登录</button>
  </div>
  <div class="container">

    <!-- 上传名单 -->
    <div class="card">
      <div class="card-title">📋 上传学生名单（批量）</div>
      <div class="card-body">
        <div id="upload-msg"></div>
        <p style="font-size:.88rem;color:#888;margin-bottom:12px">
          CSV 格式：<code>姓名,学号,班级</code>（第一行为表头，编码 UTF-8 或 GBK 均支持）
        </p>
        <label class="upload-area" id="upload-area">
          <input type="file" id="csv-file" accept=".csv" onchange="handleFile(this)">
          <div style="font-size:2rem">📂</div>
          <div>点击选择 CSV 文件</div>
          <div class="upload-hint" id="file-name">未选择文件</div>
        </label>
        <div style="margin-top:12px">
          <button class="btn btn-success" onclick="uploadStudents()">上传名单</button>
        </div>
      </div>
    </div>

    <!-- 学生名单管理 -->
    <div class="card">
      <div class="card-title">
        <span>👤 学生名单管理</span>
        <div style="display:flex;gap:8px">
          <button class="btn btn-outline-danger btn-sm" onclick="confirmClearStudents()">🗑 清空全部名单</button>
          <button class="btn btn-warning btn-sm" onclick="confirmNewSemester()">🔄 新学期重置</button>
        </div>
      </div>
      <div class="card-body">
        <div id="student-msg"></div>

        <!-- 添加单个学生 -->
        <div style="margin-bottom:16px;">
          <p style="font-size:.88rem;font-weight:bold;margin-bottom:8px;color:#555">➕ 添加单个学生</p>
          <div class="add-form">
            <div>
              <label class="form-label">姓名 *</label>
              <input type="text" id="add-name" placeholder="如：张三">
            </div>
            <div>
              <label class="form-label">学号 *</label>
              <input type="text" id="add-sid" placeholder="如：20230001">
            </div>
            <div>
              <label class="form-label">班级（可选）</label>
              <input type="text" id="add-class" placeholder="如：2023级软工1班">
            </div>
            <button class="btn btn-primary btn-sm" style="height:42px;white-space:nowrap" onclick="addStudent()">添加</button>
          </div>
        </div>

        <!-- 学生列表 -->
        <div id="student-list">加载中…</div>
      </div>
    </div>

    <!-- 考试管理 -->
    <div class="card">
      <div class="card-title">📝 考试管理 & 成绩查看</div>
      <div class="card-body">
        <div id="exams-content">加载中…</div>
      </div>
    </div>

    <!-- 进度看板（可展开） -->
    <div class="card" id="progress-board-card">
      <div class="card-title" style="cursor:pointer;background:linear-gradient(135deg, #e3f2fd, #bbdefb);" onclick="toggleProgressBoard()">
        <span>📊 进度看板 — 全班任务完成状态总览</span>
        <span id="progress-toggle-icon" style="font-size:1.2rem;">▼</span>
      </div>
      <div class="card-body" id="progress-board-body" style="display:none;padding:0;">
        <!-- 控制面板 -->
        <div style="padding:16px 20px;border-bottom:1px solid #e0e0e0;background:#fafafa;">
          <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:12px;">
            <label style="font-size:.85rem;font-weight:bold;color:#555;">📋 排序：</label>
            <select id="pb-sort-order" onchange="refreshProgressBoard()" style="padding:6px 10px;border:1px solid #d0d0d0;border-radius:6px;font-size:.85rem;">
              <option value="completion_asc">按完成率升序（落后置顶）</option>
              <option value="name_asc">按姓名升序</option>
            </select>
            <span style="width:1px;height:20px;background:#e0e0e0;"></span>
            <label style="font-size:.85rem;font-weight:bold;color:#555;">🔴 置顶倒数前</label>
            <input type="number" id="pb-bottom-n" value="5" min="0" max="50" onchange="refreshProgressBoard()" style="width:60px;text-align:center;padding:6px;border:1px solid #d0d0d0;border-radius:6px;font-size:.85rem;">
            <span style="font-size:.83rem;color:#888;">名</span>
          </div>
          <div style="display:flex;gap:18px;flex-wrap:wrap;font-size:.83rem;align-items:center;">
            <span style="font-weight:bold;color:#555;">图例：</span>
            <div style="display:flex;align-items:center;gap:6px;"><span style="width:16px;height:16px;border-radius:3px;background:#4caf50;border:1px solid rgba(0,0,0,.1);"></span>已提交（准时）</div>
            <div style="display:flex;align-items:center;gap:6px;"><span style="width:16px;height:16px;border-radius:3px;background:#ff9800;border:1px solid rgba(0,0,0,.1);"></span>迟交</div>
            <div style="display:flex;align-items:center;gap:6px;"><span style="width:16px;height:16px;border-radius:3px;background:#ef5350;border:1px solid rgba(0,0,0,.1);"></span>未提交</div>
            <div style="display:flex;align-items:center;gap:6px;"><span style="width:16px;height:16px;border-radius:3px;background:#cfd8dc;border:1px solid rgba(0,0,0,.1);"></span>任务未发布</div>
            <span style="font-size:.78rem;color:#bbb;margin-left:6px;">（点击单元格查看提交详情）</span>
          </div>
        </div>
        <!-- 热力图 -->
        <div style="padding:16px 20px;border-bottom:1px solid #e0e0e0;">
          <div style="font-weight:bold;font-size:.95rem;margin-bottom:12px;color:#333;">🔥 学生 × 任务 完成状态热力图</div>
          <div id="pb-heatmap-container">
            <div style="text-align:center;padding:30px;color:#888;">加载中…</div>
          </div>
        </div>
        <!-- 柱状图 -->
        <div style="padding:16px 20px;">
          <div style="font-weight:bold;font-size:.95rem;margin-bottom:12px;color:#333;">📊 各任务完成率趋势</div>
          <div id="pb-barchart-container">
            <canvas id="pb-barChart" style="display:block;width:100%;max-height:320px;"></canvas>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const API = '';
let TOKEN = sessionStorage.getItem('teacher_token') || '';

function showMsg(id, msg, type='success') {
  const el = document.getElementById(id);
  el.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  setTimeout(() => { if(el) el.innerHTML=''; }, 5000);
}

async function doLogin() {
  const pwd = document.getElementById('login-pwd').value;
  try {
    const r = await fetch(`${API}/api/teacher/login`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({password: pwd})
    });
    if (!r.ok) { const e = await r.json(); showMsg('login-msg', e.detail || '密码错误', 'error'); return; }
    const d = await r.json();
    TOKEN = d.token;
    sessionStorage.setItem('teacher_token', TOKEN);
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadExams();
    loadStudentList();
  } catch(e) { showMsg('login-msg', '网络错误：' + e, 'error'); }
}

function logout() {
  TOKEN = '';
  sessionStorage.removeItem('teacher_token');
  location.reload();
}

function handleFile(input) {
  document.getElementById('file-name').textContent = input.files[0]?.name || '未选择文件';
}

async function uploadStudents() {
  const file = document.getElementById('csv-file').files[0];
  if (!file) { showMsg('upload-msg', '请先选择 CSV 文件', 'error'); return; }
  const fd = new FormData();
  fd.append('file', file);
  try {
    const r = await fetch(`${API}/api/teacher/students`, {
      method: 'POST',
      headers: {'Authorization': `Bearer ${TOKEN}`},
      body: fd
    });
    const d = await r.json();
    if (!r.ok) { showMsg('upload-msg', d.detail || '上传失败', 'error'); return; }
    showMsg('upload-msg', `✅ 成功导入 ${d.count} 名学生`, 'success');
    loadExams();
    loadStudentList();
  } catch(e) { showMsg('upload-msg', '网络错误：' + e, 'error'); }
}

let currentExamId = null;
let examsData = [];

async function loadExams() {
  const r = await fetch(`${API}/api/teacher/exams`, {
    headers: {'Authorization': `Bearer ${TOKEN}`}
  });
  if (r.status === 401) { logout(); return; }
  examsData = await r.json();
  renderExams();
}

function renderExams() {
  if (!examsData.length) {
    document.getElementById('exams-content').innerHTML = '<p style="color:#888">暂无考试记录</p>';
    return;
  }
  if (!currentExamId) currentExamId = examsData[0].id;

  const tabs = examsData.map(e => `
    <button class="exam-tab ${e.id===currentExamId?'active':''}" onclick="switchExam('${e.id}')">${e.title}</button>
  `).join('');

  const exam = examsData.find(e => e.id === currentExamId) || examsData[0];
  const isActive = exam.is_active === 1;

  document.getElementById('exams-content').innerHTML = `
    <div class="exam-tabs">${tabs}</div>
    <div class="stats-grid">
      <div class="stat-item"><div class="stat-value">${exam.total_students}</div><div class="stat-label">名单人数</div></div>
      <div class="stat-item"><div class="stat-value">${exam.submitted}</div><div class="stat-label">已提交</div></div>
      <div class="stat-item"><div class="stat-value">${exam.avg_score ?? '—'}</div><div class="stat-label">平均分</div></div>
      <div class="stat-item"><div class="stat-value">${exam.total_students ? Math.round(exam.submitted/exam.total_students*100) : 0}%</div><div class="stat-label">完成率</div></div>
    </div>
    <div class="flex-row" style="margin-bottom:16px">
      <div class="toggle-switch">
        <span style="font-size:.9rem">考试状态：</span>
        <label class="switch">
          <input type="checkbox" ${isActive?'checked':''} onchange="toggleExam('${exam.id}', this.checked)">
          <span class="slider"></span>
        </label>
        <span style="font-size:.9rem;color:${isActive?'#2e7d32':'#888'}">${isActive?'开放中':'已关闭'}</span>
      </div>
      <button class="btn btn-primary btn-sm" onclick="downloadExcel('${exam.id}', '${exam.title}')">⬇ 下载 Excel 成绩单</button>
    </div>
    <div id="scores-table">加载成绩中…</div>
  `;
  loadScores(currentExamId);
}

async function switchExam(id) {
  currentExamId = id;
  renderExams();
}

async function toggleExam(id, active) {
  await fetch(`${API}/api/teacher/exams/${id}`, {
    method: 'PUT',
    headers: {'Authorization':`Bearer ${TOKEN}`,'Content-Type':'application/json'},
    body: JSON.stringify({is_active: active ? 1 : 0})
  });
  loadExams();
}

async function loadScores(examId) {
  const r = await fetch(`${API}/api/teacher/scores?exam_id=${examId}`, {
    headers: {'Authorization': `Bearer ${TOKEN}`}
  });
  const d = await r.json();
  const rows = d.rows || [];
  if (!rows.length) {
    document.getElementById('scores-table').innerHTML = '<p style="color:#888;margin-top:8px">名单为空，请先上传学生名单</p>';
    return;
  }
  const tbody = rows.map(r => `
    <tr>
      <td>${r.name}</td>
      <td>${r.student_id}</td>
      <td>${r.class_name || '—'}</td>
      <td>${r.score !== null ? `<strong>${r.score}</strong>` : '<span style="color:#bbb">未提交</span>'}</td>
      <td>${r.total ?? '—'}</td>
      <td style="font-size:.85rem;color:#888">${r.submitted_at || '—'}</td>
    </tr>
  `).join('');
  document.getElementById('scores-table').innerHTML = `
    <table>
      <thead><tr><th>姓名</th><th>学号</th><th>班级</th><th>得分</th><th>满分</th><th>提交时间</th></tr></thead>
      <tbody>${tbody}</tbody>
    </table>
  `;
}

async function downloadExcel(examId, title) {
  const url = `${API}/api/teacher/scores/export?exam_id=${examId}`;
  const r = await fetch(url, { headers: {'Authorization': `Bearer ${TOKEN}`} });
  if (!r.ok) { alert('导出失败'); return; }
  const blob = await r.blob();
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const date = new Date().toISOString().slice(0,10).replace(/-/g,'');
  a.download = `成绩单_${title}_${date}.xlsx`;
  a.click();
}

// ───── 学生名单管理 ─────

async function loadStudentList() {
  const r = await fetch(`${API}/api/teacher/students/list`, {
    headers: {'Authorization': `Bearer ${TOKEN}`}
  });
  if (!r.ok) { document.getElementById('student-list').innerHTML = '<p style="color:#c62828">加载失败</p>'; return; }
  const students = await r.json();
  if (!students.length) {
    document.getElementById('student-list').innerHTML = '<p style="color:#888;font-size:.9rem">名单为空，请添加学生或上传 CSV</p>';
    return;
  }
  const rows = students.map(s => `
    <tr>
      <td>${s.name}</td>
      <td>${s.student_id}</td>
      <td>${s.class_name || '—'}</td>
      <td>
        <button class="btn btn-outline-danger btn-sm" onclick="deleteStudent('${s.student_id}','${s.name}')">删除</button>
      </td>
    </tr>
  `).join('');
  document.getElementById('student-list').innerHTML = `
    <p style="font-size:.85rem;color:#888;margin-bottom:8px">共 ${students.length} 名学生</p>
    <table>
      <thead><tr><th>姓名</th><th>学号</th><th>班级</th><th>操作</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

async function addStudent() {
  const name = document.getElementById('add-name').value.trim();
  const sid  = document.getElementById('add-sid').value.trim();
  const cls  = document.getElementById('add-class').value.trim();
  if (!name || !sid) { showMsg('student-msg', '姓名和学号不能为空', 'error'); return; }
  try {
    const r = await fetch(`${API}/api/teacher/students/add`, {
      method: 'POST',
      headers: {'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json'},
      body: JSON.stringify({name, student_id: sid, class_name: cls || null})
    });
    const d = await r.json();
    if (!r.ok) { showMsg('student-msg', d.detail || '添加失败', 'error'); return; }
    showMsg('student-msg', `✅ 已添加学生：${name}（${sid}）`);
    document.getElementById('add-name').value = '';
    document.getElementById('add-sid').value = '';
    document.getElementById('add-class').value = '';
    loadStudentList();
    loadExams();
  } catch(e) { showMsg('student-msg', '网络错误：' + e, 'error'); }
}

async function deleteStudent(sid, name) {
  showConfirmDialog(
    '删除学生',
    `确认删除学生 <strong>${name}（${sid}）</strong>？<br>该学生的成绩记录也将一并删除。`,
    async () => {
      const r = await fetch(`${API}/api/teacher/students/${encodeURIComponent(sid)}`, {
        method: 'DELETE',
        headers: {'Authorization': `Bearer ${TOKEN}`}
      });
      const d = await r.json();
      if (!r.ok) { showMsg('student-msg', d.detail || '删除失败', 'error'); return; }

// 获取进度看板数据（调用后端API）
async function fetchProgressData() {
  const sortOrder = document.getElementById('pb-sort-order').value;
  const bottomN = parseInt(document.getElementById('pb-bottom-n').value) || 5;
  
  try {
    const params = new URLSearchParams({
      sort_order: sortOrder,
      bottom_n: bottomN
    });
    
    const resp = await fetch(`${API}/api/teacher/progress/matrix?${params}`, {
      headers: { 'Authorization': `Bearer ${TOKEN}` }
    });
    
    if (!resp.ok) {
      throw new Error('获取进度数据失败');
    }
    
    pbData = await resp.json();
    renderPBHeatmap(pbData);
    renderPBBarChart(pbData);
    
    // 更新图例下的提示文字
    const legendDiv = document.querySelector('#progress-board-body .card-body div:nth-child(1)');
    if (legendDiv) {
      const statSpan = legendDiv.querySelector('span:last-child');
      if (statSpan) {
        statSpan.textContent = `（点击单元格查看提交详情 · ${pbData.students?.length || 0} 名学生 · ${pbData.exams?.filter(e => e.is_active)?.length || 0} 个任务）`;
      }
    }
    
  } catch (e) {
    console.error('获取进度数据失败:', e);
    // 如果API调用失败，显示静态演示数据
    loadStaticDemoData();
  }
}

// 启动 SSE 实时更新
function startPBEventSource() {
  if (pbEventSource) return;
  
  try {
    const url = `${API}/api/teacher/progress/events?token=${encodeURIComponent(TOKEN)}`;
    pbEventSource = new EventSource(url);
    
    pbEventSource.onmessage = function(event) {
      try {
        const data = JSON.parse(event.data);
        pbData = data;
        refreshProgressBoard();
      } catch (e) {
        console.error('解析 SSE 数据失败:', e);
      }
    };
    
    pbEventSource.onerror = function(error) {
      console.error('SSE 连接错误:', error);
      pbEventSource.close();
      pbEventSource = null;
    };
    
  } catch (e) {
    console.warn('SSE 不可用，将使用轮询方式');
  }
}

// 停止 SSE 连接
function stopPBEventSource() {
  if (pbEventSource) {
    pbEventSource.close();
    pbEventSource = null;
  }
}

// 刷新看板数据
function refreshProgressBoard() {
  if (!pbData) return;
  
  const sortOrder = document.getElementById('pb-sort-order').value;
  const bottomN = parseInt(document.getElementById('pb-bottom-n').value) || 5;
  
  // 复制数据
  let students = JSON.parse(JSON.stringify(pbData.students));
  let exams = JSON.parse(JSON.stringify(pbData.exams));
  
  // 排序和置顶标记
  if (sortOrder === 'completion_asc') {
    students.sort((a,b) => a.completion_rate - b.completion_rate);
    students.forEach((s, idx) => { s.highlight = (idx < bottomN && s.completion_rate < 1); });
  } else {
    students.sort((a,b) => (a.name||'').localeCompare(b.name||''));
    students.forEach(s => { s.highlight = false; });
  }
  
  // 更新考试完成率（如果后端没有提供）
  const activeExams = exams.filter(e => e.is_active);
  activeExams.forEach(e => {
    if (e.completion_rate === undefined || e.submitted === undefined) {
      let sub = 0;
      students.forEach(s => {
        const st = (s.statuses||{})[e.id];
        if (st && (st.status === 'submitted' || st.status === 'late')) sub++;
      });
      e.total_students = students.length;
      e.submitted = sub;
      e.completion_rate = students.length > 0 ? Math.round(sub / students.length * 1000) / 1000 : 0;
    }
  });
  
  const filteredData = {students, exams: activeExams};
  renderPBHeatmap(filteredData);
  renderPBBarChart(filteredData);
}

// 渲染柱状图
function renderPBBarChart(data) {
  const canvas = document.getElementById('pb-barChart');
  const wrapper = document.getElementById('pb-barchart-container');
  const exams = (data.exams || []).filter(e => e.is_active);
  
  exams.sort((a,b) => (a.published_at||'').localeCompare(b.published_at||''));
  
  if (!exams.length) {
    wrapper.innerHTML = '<div style="text-align:center;padding:40px;color:#888;">暂无活跃任务</div>';
    return;
  }
  
  // 恢复 canvas
  if (!wrapper.querySelector('canvas')) {
    wrapper.innerHTML = '<canvas id="pb-barChart" style="display:block;width:100%;max-height:320px;"></canvas>';
  }
  const ctxCanvas = document.getElementById('pb-barChart');
  
  const dpr = window.devicePixelRatio || 1;
  const W = Math.max(300, wrapper.clientWidth - 20);
  const H = 300;
  ctxCanvas.width = W * dpr;
  ctxCanvas.height = H * dpr;
  ctxCanvas.style.width = W + 'px';
  ctxCanvas.style.height = H + 'px';
  const ctx = ctxCanvas.getContext('2d');
  ctx.scale(dpr, dpr);
  
  const pad = {top:30,right:30,bottom:70,left:50};
  const plotW = W - pad.left - pad.right;
  const plotH = H - pad.top - pad.bottom;
  
  ctx.clearRect(0,0,W,H);
  
  // 网格
  ctx.strokeStyle = '#e8e8e8';
  ctx.lineWidth = 1;
  for (let i=0;i<=4;i++) {
    const y = pad.top + (plotH/4)*i;
    ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(W-pad.right,y);ctx.stroke();
    ctx.fillStyle = '#888';
    ctx.font = '11px "Microsoft YaHei",sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText((100-i*25)+'%',pad.left-8,y+4);
  }
  
  // 轴线
  ctx.strokeStyle = '#bbb';
  ctx.lineWidth = 1.5;
  ctx.beginPath();ctx.moveTo(pad.left,pad.top);ctx.lineTo(pad.left,H-pad.bottom);ctx.stroke();
  ctx.beginPath();ctx.moveTo(pad.left,H-pad.bottom);ctx.lineTo(W-pad.right,H-pad.bottom);ctx.stroke();
  
  // 柱状条
  const barCount = exams.length;
  const barGap = Math.max(10,plotW/(barCount*3));
  const barW = Math.max(20,(plotW-barGap*(barCount+1))/barCount);
  
  exams.forEach((e,idx) => {
    const x = pad.left + barGap + idx*(barW+barGap);
    const bh = Math.max(2,e.completion_rate*plotH);
    const y = H - pad.bottom - bh;
    
    const grad = ctx.createLinearGradient(x,y,x,H-pad.bottom);
    if (e.completion_rate >= 0.8) { grad.addColorStop(0,'#4caf50');grad.addColorStop(1,'#66bb6a'); }
    else if (e.completion_rate >= 0.5) { grad.addColorStop(0,'#ff9800');grad.addColorStop(1,'#ffb74d'); }
    else { grad.addColorStop(0,'#ef5350');grad.addColorStop(1,'#e57373'); }
    ctx.fillStyle = grad;
    ctx.fillRect(x,y,barW,bh);
    
    ctx.fillStyle = '#333';
    ctx.font = 'bold 11px "Microsoft YaHei",sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(Math.round(e.completion_rate*100)+'%',x+barW/2,y-8);
    
    ctx.fillStyle = '#666';
    ctx.font = '9px "Microsoft YaHei",sans-serif';
    ctx.fillText(e.submitted+'/'+e.total_students,x+barW/2,H-pad.bottom+14);
    
    ctx.save();
    ctx.fillStyle = '#555';
    ctx.font = '10px "Microsoft YaHei",sans-serif';
    ctx.textAlign = 'right';
    ctx.translate(x+barW/2,H-pad.bottom+30);
    ctx.rotate(-Math.PI/6);
    const label = (e.id||'').replace('hw','作业');
    ctx.fillText(label,0,0);
    ctx.restore();
  });
  
  ctx.fillStyle = '#999';
  ctx.font = '10px "Microsoft YaHei",sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('共 '+exams[0].total_students+' 名学生 · '+exams.length+' 个活跃任务',W/2,H-4);
}

// 显示详情弹窗

  if (!pbData) return;
  const student = pbData.students.find(s => s.student_id === studentId);
  const exam = pbData.exams.find(e => e.id === examId);
  if (!student || !exam) return;
  
  const st = student.statuses[examId] || {status:'not_published'};
  const badgeMap = {
    submitted:{text:'✅ 已提交（准时）',color:'#fff',bg:'#4caf50'},
    late:{text:'⚠️ 迟交',color:'#fff',bg:'#ff9800'},
    unsubmitted:{text:'❌ 未提交',color:'#fff',bg:'#ef5350'},
    not_published:{text:'🔒 任务未发布',color:'#666',bg:'#cfd8dc'}
  };
  const badge = badgeMap[st.status];
  
  let details = '<dt>学生姓名</dt><dd>' + student.name + '</dd>';
  details += '<dt>学号</dt><dd>' + student.student_id + '</dd>';
  details += '<dt>班级</dt><dd>' + (student.class_name||'—') + '</dd>';
  details += '<dt>任务名称</dt><dd>' + exam.title + '</dd>';
  details += '<dt>状态</dt><dd><span style="display:inline-block;padding:2px 10px;border-radius:12px;font-size:.8rem;font-weight:bold;background:'+badge.bg+';color:'+badge.color+'">'+badge.text+'</span></dd>';
  
  if (st.submitted_at) {
    details += '<dt>提交时间</dt><dd>' + st.submitted_at + '</dd>';
    if (st.score !== undefined) details += '<dt>得分</dt><dd><b>' + st.score + '</b> / ' + st.total + '</dd>';
  }
  if (exam.deadline) details += '<dt>截止时间</dt><dd>' + exam.deadline.replace('T',' ') + '</dd>';
  
  const backdrop = document.createElement('div');
  backdrop.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;';
  backdrop.innerHTML = 
    '<div style="background:#fff;border-radius:12px;padding:28px;max-width:480px;width:90%;box-shadow:0 12px 40px rgba(0,0,0,.25);">'+
    '<h3 style="margin-bottom:4px;color:#1565c0;">📋 提交详情</h3>'+
    '<p style="color:#888;font-size:.84rem;margin-bottom:16px;">' + student.name + ' — ' + exam.title + '</p>'+
    '<dl style="display:grid;grid-template-columns:90px 1fr;gap:10px 14px;font-size:.88rem;margin-bottom:20px;">' + details + '</dl>'+
    '<div style="display:flex;justify-content:flex-end;">'+
    '<button onclick="this.closest(\'.confirm-dialog-backdrop\').remove()" style="padding:8px 20px;border:none;border-radius:6px;background:#1565c0;color:#fff;cursor:pointer;font-size:.88rem;">关闭</button>'+
    '</div></div>';
  backdrop.className = 'confirm-dialog-backdrop';
  document.body.appendChild(backdrop);
  
  backdrop.onclick = e => { if (e.target === backdrop) backdrop.remove(); };
}
</script>
<style>
/* 进度看板热力图样式 */
.pb-cell { display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:5px;cursor:pointer;transition:transform .15s,box-shadow .15s;font-size:.72rem;color:#fff;font-weight:bold;user-select:none; }
.pb-cell:hover { transform:scale(1.25);z-index:5;box-shadow:0 3px 12px rgba(0,0,0,.3); }
.pb-cell.submitted { background:#4caf50; }
.pb-cell.late { background:#ff9800; }
.pb-cell.unsubmitted { background:#ef5350; }
.pb-cell.not_published { background:#cfd8dc;color:#90a4ae; }
</style>
