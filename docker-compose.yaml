services:
  # 该 Compose 文件用于 Coolify 部署。
  # 注意：Coolify 的容器路由判断依赖服务健康状况，必须配置 healthcheck。
  # 如果没有 healthcheck，Coolify 有时会认为服务不可用，导致路由失败。
  oaepp_web:
    container_name: oaepp_web
    build:
      context: .
      network: host          # 构建时 pip install 需要访问互联网
    expose:
      - "80"
    restart: unless-stopped
    depends_on:
      - oaepp_api
    healthcheck:
      # 注意：这里必须配置 healthcheck，Coolify 才能确定容器已经启动并可路由。
      # 如果没有健康检查，Coolify 可能不会把该服务加入可用 backend，导致访问失败。
      # 这里只是检测 nginx 进程是否存在，用于确认应用已经准备就绪。
      test: ["CMD-SHELL", "pidof nginx || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - coolify              # 连接到 Coolify 全局网络，供 Caddy/代理服务访问

  oaepp_api:
    container_name: oaepp_api
    build:
      context: .                        # 构建上下文扩展到项目根目录（需要复制 docs/）
      dockerfile: backend/Dockerfile
      network: host          # 构建时 pip install 需要访问互联网
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "8000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - exam_data:/app/data  # SQLite 数据库持久化
      - ./docs:/app/docs:rw  # Markdown 文件（sync_exams 可自动注入 exam-meta）
    environment:
      - TEACHER_PASSWORD=${TEACHER_PASSWORD:-admin123}
      - JWT_SECRET=${JWT_SECRET:-please-change-this-secret}
      - DB_PATH=/app/data/exam.db
      - DOCS_DIR=/app/docs
    networks:
      - coolify

  oaepp-mysql:
    container_name: oaepp_mysql
    image: mysql:8.0
    restart: unless-stopped
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me}
      MYSQL_ROOT_HOST: '%'
      MYSQL_USER: user
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me}
      MYSQL_DATABASE: oaepp_database
    volumes:
      - oaepp_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coolify

  oaepp-phpmyadmin:
    container_name: oaepp_phpmyadmin
    image: phpmyadmin:latest
    restart: unless-stopped
    environment:
      PMA_HOST: oaepp-mysql
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me}
    expose:
      - "80"
    # phpMyAdmin 作为 Web UI 服务，需要通过 healthcheck 告知 Coolify 本服务可用。
    # 该检查必须能在容器内访问本地 HTTP 服务，否则 Coolify 可能不会将其纳入路由。
    healthcheck:
      # phpmyadmin 镜像中 PHP CLI 的 allow_url_fopen 默认可能被禁用，file_get_contents HTTP 请求不可靠。
      # 使用 curl 作为更稳定的本地 HTTP 健康检查命令。
      test: ["CMD-SHELL", "curl -f http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      - oaepp-mysql
    networks:
      - coolify

  oaepp-redis:
    container_name: oaepp_redis
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - oaepp_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coolify

  oaepp-redis-commander:
    container_name: oaepp_redis_commander
    image: rediscommander/redis-commander:latest
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:oaepp-redis:6379
    expose:
      - "8081"
    # Redis Commander 作为独立运维界面，也需要 healthcheck 才能被 Coolify 路由。
    # 该检查会在容器内访问本地 8081 端口，确保服务已经启动完成。
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:8081', res => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      - oaepp-redis
    networks:
      - coolify

volumes:
  exam_data:
  oaepp_mysql_data:
  oaepp_redis_data:

networks:
  coolify:
    external: true           # 引用已存在的 Coolify 全局网络
