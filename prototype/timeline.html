        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
        在线考试

      <a href="profile.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50 text-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        个人资料

    <div class="px-4 py-4 border-t border-gray-100">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 font-bold text-sm">张</div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-gray-800 truncate">张三</p>
          <p class="text-xs text-gray-400 truncate">2021001001</p>
        </div>
      </div>
      <a href="login.html" class="mt-3 block text-center text-xs text-gray-400 hover:text-red-500 transition">退出登录</a>
    </div>
  </aside>

  <main class="ml-56 flex-1 p-8">
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-xl font-bold text-gray-800">学习时间线</h1>
        <p class="text-sm text-gray-400 mt-0.5">追踪学习任务发布 → 提交 → 批改 → 反馈全流程</p>
      </div>
    </div>

    <div class="grid grid-cols-4 gap-4 mb-6">
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4 flex items-center gap-3">
        <div class="w-10 h-10 rounded-lg bg-blue-100 flex items-center justify-center flex-shrink-0">
          <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
          </svg>
        </div>
        <div>
          <p class="text-xs text-gray-400">任务发布</p>
          <p class="text-xl font-bold text-blue-600" id="publish-count">-</p>
        </div>
      </div>
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4 flex items-center gap-3">
        <div class="w-10 h-10 rounded-lg bg-green-100 flex items-center justify-center flex-shrink-0">
          <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
        <div>
          <p class="text-xs text-gray-400">已提交</p>
          <p class="text-xl font-bold text-green-600" id="submit-count">-</p>
        </div>
      </div>
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4 flex items-center gap-3">
        <div class="w-10 h-10 rounded-lg bg-orange-100 flex items-center justify-center flex-shrink-0">
          <svg class="w-5 h-5 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
          </svg>
        </div>
        <div>
          <p class="text-xs text-gray-400">已批改</p>
          <p class="text-xl font-bold text-orange-600" id="grade-count">-</p>
        </div>
      </div>
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4 flex items-center gap-3">
        <div class="w-10 h-10 rounded-lg bg-purple-100 flex items-center justify-center flex-shrink-0">
          <svg class="w-5 h-5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
          </svg>
        </div>
        <div>
          <p class="text-xs text-gray-400">反馈</p>
          <p class="text-xl font-bold text-purple-600" id="feedback-count">-</p>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-6">
      <div id="timeline-list" class="space-y-0">
        <div class="text-center py-12 text-gray-400">加载中...</div>
      </div>
    </div>
  </main>

  <script>
    const DEMO_EVENTS = [
      { id: 1, event_type: 'publish', title: '第3章作业发布', description: '机器人运动学基础作业', course: '机器人学', related_id: 'exam-03', event_time: '2026-03-01 08:00' },
      { id: 2, event_type: 'submit', title: '第3章作业已提交', description: '提交文件：运动学分析报告.pdf', course: '机器人学', related_id: 'exam-03', event_time: '2026-03-05 14:30' },
      { id: 3, event_type: 'grade', title: '第3章作业已批改', description: '得分：85/100', course: '机器人学', related_id: 'exam-03', event_time: '2026-03-08 10:00' },
      { id: 4, event_type: 'feedback', title: '收到第3章批改反馈', description: '教师评语：分析部分做得很好，计算过程需更详细', course: '机器人学', related_id: 'exam-03', event_time: '2026-03-08 10:30' },
      { id: 5, event_type: 'publish', title: '期中考试发布', description: '机器人系统期中考试', course: '机器人学', related_id: 'exam-mid', event_time: '2026-04-01 08:00' },
      { id: 6, event_type: 'submit', title: '期中考试已提交', description: '提交用时：45分钟', course: '机器人学', related_id: 'exam-mid', event_time: '2026-04-10 11:20' },
      { id: 7, event_type: 'grade', title: '期中考试成绩公布', description: '得分：92/100', course: '机器人学', related_id: 'exam-mid', event_time: '2026-04-12 14:00' },
      { id: 8, event_type: 'publish', title: '课程设计任务发布', description: '基于ROS的机器人导航仿真', course: '工程实践', related_id: 'project-01', event_time: '2026-04-15 08:00' },
      { id: 9, event_type: 'submit', title: '课程设计初稿已提交', description: '提交文件：导航仿真源码.zip', course: '工程实践', related_id: 'project-01', event_time: '2026-04-28 23:15' },
      { id: 10, event_type: 'feedback', title: '收到课程设计反馈', description: '建议优化路径规划算法', course: '工程实践', related_id: 'project-01', event_time: '2026-05-02 09:00' },
    ];

    const TYPE_CONFIG = {
      publish: { icon: '📋', bg: 'bg-blue-100', text: 'text-blue-700', dot: 'bg-blue-500', border: 'border-blue-200', label: '发布' },
      submit: { icon: '📤', bg: 'bg-green-100', text: 'text-green-700', dot: 'bg-green-500', border: 'border-green-200', label: '提交' },
      grade: { icon: '📝', bg: 'bg-orange-100', text: 'text-orange-700', dot: 'bg-orange-500', border: 'border-orange-200', label: '批改' },
      feedback: { icon: '💬', bg: 'bg-purple-100', text: 'text-purple-700', dot: 'bg-purple-500', border: 'border-purple-200', label: '反馈' },
    };

    function renderTimeline(events) {
      const container = document.getElementById('timeline-list');
      if (!events || events.length === 0) {
        container.innerHTML = '<div class="text-center py-12 text-gray-400">暂无时间线事件</div>';
        return;
      }

      const counts = { publish: 0, submit: 0, grade: 0, feedback: 0 };
      events.forEach(e => { if (counts[e.event_type] !== undefined) counts[e.event_type]++; });
      document.getElementById('publish-count').textContent = counts.publish;
      document.getElementById('submit-count').textContent = counts.submit;
      document.getElementById('grade-count').textContent = counts.grade;
      document.getElementById('feedback-count').textContent = counts.feedback;

      let html = '<div class="relative"><div class="absolute left-6 top-0 bottom-0 w-0.5 bg-gray-200"></div>';
      events.forEach((event) => {
        const cfg = TYPE_CONFIG[event.event_type] || TYPE_CONFIG.publish;
        html += '<div class="relative flex gap-4 pb-8">';
        html += `<div class="relative z-10 flex-shrink-0 w-12 h-12 ${cfg.bg} rounded-full flex items-center justify-center text-lg shadow-sm border-2 border-white">${cfg.icon}</div>`;
        html += '<div class="flex-1 min-w-0 pt-1">';
        html += `<div class="bg-white rounded-lg border ${cfg.border} shadow-sm p-4 hover:shadow-md transition-shadow">`;
        html += '<div class="flex items-center gap-2 mb-1">';
        html += `<span class="text-xs font-medium px-2 py-0.5 rounded-full ${cfg.bg} ${cfg.text}">${cfg.label}</span>`;
        html += `<span class="text-xs text-gray-400">${event.event_time}</span>`;
        if (event.course) html += `<span class="text-xs text-gray-400 ml-auto">${event.course}</span>`;
        html += '</div>';
        html += `<h3 class="text-sm font-semibold text-gray-800">${event.title}</h3>`;
        if (event.description) html += `<p class="text-xs text-gray-500 mt-1">${event.description}</p>`;
        html += '</div></div></div>';
      });
      html += '</div>';
      container.innerHTML = html;
    }

    renderTimeline(DEMO_EVENTS);
  </script>
</body>
</html>
